<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Jewel Case Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #08080f;
  --bg2:       #0e0e1a;
  --bg3:       #14141f;
  --panel:     #10101c;
  --border:    rgba(255,255,255,0.07);
  --accent:    #00d4ff;
  --accent2:   #7b2fff;

  --c-common:    #9ca3af;
  --c-rare:      #3b82f6;
  --c-epic:      #a855f7;
  --c-legendary: #f59e0b;
  --c-mythic:    #ec4899;
  --c-exotic:    #10b981;
  --c-divine:    #fde68a;
  --c-zenith:    #ff4500;

  --font-head: 'Exo 2', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #e0e0e0;
  font-family: var(--font-body);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridDrift 20s linear infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes gridDrift {
  0%   { background-position: 0 0, 0 0; }
  100% { background-position: 40px 40px, 40px 40px; }
}

body::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(123,47,255,0.08) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none;
  z-index: 0;
  animation: orbPulse 6s ease-in-out infinite alternate;
}
@keyframes orbPulse { from { opacity: 0.5; } to { opacity: 1; } }

/* TOP BAR */
#top-bar {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
  border-bottom: 1px solid rgba(0,212,255,0.15);
  flex-shrink: 0;
}

#game-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#balance-label {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,212,255,0.6);
  letter-spacing: 1px;
}

#gift-label {
  font-size: 14px;
  font-weight: 600;
  color: #ff6b6b;
  text-shadow: 0 0 10px rgba(255,107,107,0.5);
  letter-spacing: 1px;
  min-width: 200px;
  text-align: right;
  animation: giftPulse 1s ease-in-out infinite alternate;
}
@keyframes giftPulse { from { opacity: 0.7; } to { opacity: 1; } }

/* MAIN */
#main-content {
  position: relative; z-index: 5;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  flex: 1;
  padding: 16px 20px 20px;
  min-height: 0;
}

/* PANELS */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.panel-title {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* CASE SHOP */
#cases-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,212,255,0.3) transparent;
}
#cases-scroll::-webkit-scrollbar { width: 4px; }
#cases-scroll::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }

#cases-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.case-card {
  cursor: pointer;
  border-radius: 6px;
  padding: 1.5px;
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
}
.case-card:hover { transform: translateY(-3px) scale(1.02); }

.case-card-inner {
  background: var(--bg3);
  border-radius: 5px;
  padding: 14px 8px 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  height: 108px;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: background 0.18s;
}
.case-card:hover .case-card-inner { background: #1a1a28; }

.case-card-inner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.case-card:hover .case-card-inner::after { transform: translateX(100%); }

.case-emoji { font-size: 30px; line-height: 1; }
.case-name {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #fff;
}
.case-cost { font-size: 12px; font-weight: 600; color: #888; }

/* rarity borders + glows */
.r-Common    { background: var(--c-common);    box-shadow: 0 0 10px rgba(156,163,175,0.25); }
.r-Rare      { background: var(--c-rare);      box-shadow: 0 0 12px rgba(59,130,246,0.35); }
.r-Epic      { background: var(--c-epic);      box-shadow: 0 0 14px rgba(168,85,247,0.4); }
.r-Legendary { background: var(--c-legendary); box-shadow: 0 0 16px rgba(245,158,11,0.45); }
.r-Mythic    { background: var(--c-mythic);    box-shadow: 0 0 18px rgba(236,72,153,0.5); }
.r-Exotic    { background: var(--c-exotic);    box-shadow: 0 0 20px rgba(16,185,129,0.5); }
.r-Divine    { background: var(--c-divine);    box-shadow: 0 0 22px rgba(253,230,138,0.5); }
.r-Zenith    { background: var(--c-zenith);    box-shadow: 0 0 26px rgba(255,69,0,0.6); animation: zenithGlow 1.5s ease-in-out infinite alternate; }
@keyframes zenithGlow {
  from { box-shadow: 0 0 20px rgba(255,69,0,0.5); }
  to   { box-shadow: 0 0 35px rgba(255,69,0,0.8), 0 0 60px rgba(255,69,0,0.3); }
}

/* RIGHT COLUMN */
#right-section { display: flex; flex-direction: column; min-height: 0; }
#right-section.panel { flex: 1; }
#right-content {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  flex: 1;
  padding: 12px 16px 16px;
  min-height: 0;
}

/* INVENTORY LIST */
#inventory-list {
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg2);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#inventory-list::-webkit-scrollbar { width: 4px; }
#inventory-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.inv-item {
  padding: 7px 12px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s, padding-left 0.12s;
  border-left: 3px solid transparent;
}
.inv-item:hover { background: rgba(255,255,255,0.04); padding-left: 16px; }
.inv-item.selected { background: rgba(255,255,255,0.07); }

.inv-Common    { color: var(--c-common);    border-left-color: var(--c-common); }
.inv-Rare      { color: var(--c-rare);      border-left-color: var(--c-rare); }
.inv-Epic      { color: var(--c-epic);      border-left-color: var(--c-epic); }
.inv-Legendary { color: var(--c-legendary); border-left-color: var(--c-legendary); }
.inv-Mythic    { color: var(--c-mythic);    border-left-color: var(--c-mythic); }
.inv-Exotic    { color: var(--c-exotic);    border-left-color: var(--c-exotic); }
.inv-Divine    { color: var(--c-divine);    border-left-color: var(--c-divine); }
.inv-Zenith    { color: var(--c-zenith);    border-left-color: var(--c-zenith); }

/* PREVIEW PANEL */
#preview-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg2);
  padding: 14px 10px;
  position: relative;
  overflow: hidden;
}

#preview-header {
  font-family: var(--font-head);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 8px;
}

#preview-emoji {
  font-size: 64px;
  line-height: 1;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: filter 0.4s;
}

#preview-name {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-top: 6px;
}

#preview-rarity {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 3px;
  transition: color 0.3s, text-shadow 0.3s;
}

#preview-price {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}

#sell-btn {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 3px;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 0 0 rgba(0,212,255,0);
}
#sell-btn:hover:not(:disabled) {
  box-shadow: 0 0 20px rgba(0,212,255,0.4);
  transform: translateY(-1px);
}
#sell-btn:active:not(:disabled) { transform: scale(0.97); }
#sell-btn:disabled {
  background: #1a1a2a;
  color: rgba(255,255,255,0.15);
  cursor: default;
  box-shadow: none;
}

/* FULLSCREEN OVERLAY */
#fullscreen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0a0a18 0%, #03030a 100%);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 200;
}
#fullscreen-overlay.active {
  display: flex;
  animation: overlayIn 0.3s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

#fullscreen-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.5) 0%, transparent 0%),
    radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 0%),
    radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.5) 0%, transparent 0%),
    radial-gradient(1px 1px at 8%  65%, rgba(255,255,255,0.3) 0%, transparent 0%),
    radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.4) 0%, transparent 0%),
    radial-gradient(1px 1px at 88%  8%, rgba(255,255,255,0.5) 0%, transparent 0%),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.3) 0%, transparent 0%),
    radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.4) 0%, transparent 0%),
    radial-gradient(1px 1px at 92% 78%, rgba(255,255,255,0.3) 0%, transparent 0%),
    radial-gradient(1px 1px at 22% 88%, rgba(255,255,255,0.4) 0%, transparent 0%);
  pointer-events: none;
}

#fs-glow {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  pointer-events: none;
  transition: background 0.6s;
  animation: fsGlowPulse 2.5s ease-in-out infinite;
}
@keyframes fsGlowPulse {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50%      { transform: scale(1.15); opacity: 1; }
}

#fs-ring {
  position: absolute;
  width: 340px; height: 340px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,0.18);
  animation: ringPulse 2s ease-in-out infinite;
  pointer-events: none;
  transition: border-color 0.5s;
}
#fs-ring2 {
  position: absolute;
  width: 440px; height: 440px;
  border-radius: 50%;
  border: 1px solid rgba(123,47,255,0.12);
  animation: ringPulse 2s ease-in-out infinite 0.6s;
  pointer-events: none;
  transition: border-color 0.5s;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50%      { transform: scale(1.06); opacity: 1; }
}

#box-icon {
  font-size: 160px;
  line-height: 1;
  display: block;
  user-select: none;
  position: relative;
  z-index: 2;
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-14px); }
}

#instruction-label {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,212,255,0.8);
  margin-top: 36px;
  pointer-events: none;
  user-select: none;
  position: relative; z-index: 2;
  transition: color 0.4s, text-shadow 0.4s;
  animation: labelPulse 1.4s ease-in-out infinite alternate;
}
@keyframes labelPulse {
  from { opacity: 0.8; }
  to   { opacity: 1; }
}

#subtext-label {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 10px;
  pointer-events: none;
  user-select: none;
  position: relative; z-index: 2;
  transition: color 0.4s;
}

#back-btn {
  display: none;
  margin-top: 28px;
  padding: 13px 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 3px;
  position: relative; z-index: 2;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 20px rgba(0,212,255,0.3);
  pointer-events: all;
}
#back-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 35px rgba(0,212,255,0.5);
}

/* rarity glows for fullscreen icon */
.glow-Common    { filter: drop-shadow(0 0 18px var(--c-common)); }
.glow-Rare      { filter: drop-shadow(0 0 24px var(--c-rare)); }
.glow-Epic      { filter: drop-shadow(0 0 28px var(--c-epic)); }
.glow-Legendary { filter: drop-shadow(0 0 35px var(--c-legendary)); }
.glow-Mythic    { filter: drop-shadow(0 0 40px var(--c-mythic)); }
.glow-Exotic    { filter: drop-shadow(0 0 45px var(--c-exotic)); }
.glow-Divine    { filter: drop-shadow(0 0 50px var(--c-divine)); animation: divineFloat 2s ease-in-out infinite, divineGlow 1.5s ease-in-out infinite alternate !important; }
.glow-Zenith    { filter: drop-shadow(0 0 60px var(--c-zenith)); animation: iconFloat 2s ease-in-out infinite, zenithIconGlow 1s ease-in-out infinite alternate !important; }

@keyframes divineFloat {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-14px) rotate(1deg); }
}
@keyframes divineGlow {
  from { filter: drop-shadow(0 0 40px #fde68a); }
  to   { filter: drop-shadow(0 0 70px #fde68a) drop-shadow(0 0 100px #fde68a88); }
}
@keyframes zenithIconGlow {
  from { filter: drop-shadow(0 0 40px #ff4500); }
  to   { filter: drop-shadow(0 0 80px #ff4500) drop-shadow(0 0 120px #ff450066); }
}
</style>
</head>
<body>

<div id="top-bar">
  <div id="game-title">💎 Jewel Case Simulator</div>
  <div id="balance-label">💎 10,000</div>
  <div id="gift-label"></div>
</div>

<div id="main-content">
  <div class="panel" id="left-section">
    <div class="panel-title">⬡ Case Shop</div>
    <div id="cases-scroll">
      <div id="cases-grid"></div>
    </div>
  </div>

  <div class="panel" id="right-section">
    <div class="panel-title">⬡ Inventory</div>
    <div id="right-content">
      <div id="inventory-list"></div>
      <div id="preview-panel">
        <div id="preview-header">Preview</div>
        <div id="preview-emoji"></div>
        <div id="preview-name"></div>
        <div id="preview-rarity"></div>
        <div id="preview-price"></div>
        <button id="sell-btn" disabled>Sell</button>
      </div>
    </div>
  </div>
</div>

<div id="fullscreen-overlay">
  <div id="fs-glow"></div>
  <div id="fs-ring"></div>
  <div id="fs-ring2"></div>
  <span id="box-icon"></span>
  <div id="instruction-label">Click to Open</div>
  <div id="subtext-label"></div>
  <button id="back-btn" onclick="endFullscreen()">↩ Back to Menu</button>
</div>

<script>
const JEWEL = "💎", GIFT = "🎁", HOURGLASS = "⌛";

const RARITY_COLORS = {
  Common:"#9ca3af", Rare:"#3b82f6", Epic:"#a855f7",
  Legendary:"#f59e0b", Mythic:"#ec4899", Exotic:"#10b981",
  Divine:"#fde68a", Zenith:"#ff4500"
};
const RARITY_ORDER = ["Common","Rare","Epic","Legendary","Mythic","Exotic","Divine","Zenith"];

const ITEMS = {
  "Stick":{rarity:"Common",price:75,emoji:"🪵"},"Shoe":{rarity:"Common",price:75,emoji:"👞"},
  "Bone":{rarity:"Common",price:75,emoji:"🦴"},"Bread":{rarity:"Common",price:75,emoji:"🍞"},

  "Sword":{rarity:"Rare",price:300,emoji:"⚔️"},"Shield":{rarity:"Rare",price:300,emoji:"🛡️"},
  "Bow":{rarity:"Rare",price:300,emoji:"🏹"},"Ring":{rarity:"Rare",price:300,emoji:"💍"},
  "Potion":{rarity:"Rare",price:300,emoji:"🧪"},"Armor":{rarity:"Rare",price:300,emoji:"🥿"},
  "Boots":{rarity:"Rare",price:300,emoji:"👢"},
  "Orb":{rarity:"Epic",price:1500,emoji:"🔮"},"Trident":{rarity:"Epic",price:1500,emoji:"🔱"},
  "Axe":{rarity:"Epic",price:1500,emoji:"🪓"},"Ruby":{rarity:"Epic",price:1500,emoji:"💎"},
  "Mask":{rarity:"Epic",price:1500,emoji:"🎭"},"Lantern":{rarity:"Epic",price:1500,emoji:"🏮"},
  "Backpack":{rarity:"Epic",price:1500,emoji:"🎒"},
  "Crown":{rarity:"Legendary",price:10000,emoji:"👑"},"Egg":{rarity:"Legendary",price:10000,emoji:"🥚"},
  "Star":{rarity:"Legendary",price:10000,emoji:"⭐"},"Staff":{rarity:"Legendary",price:10000,emoji:"🔱"},
  "Golden Bow":{rarity:"Legendary",price:10000,emoji:"🎯"},"Key":{rarity:"Legendary",price:10000,emoji:"🔑"},
  "Amulet":{rarity:"Legendary",price:10000,emoji:"📿"},"Diamond":{rarity:"Legendary",price:10000,emoji:"◆"},
  "Golden Phoenix":{rarity:"Mythic",price:150000,emoji:"🐦‍🔥"},"Cursed Blade":{rarity:"Mythic",price:175000,emoji:"⚔️"},
  "Shadow Crown":{rarity:"Mythic",price:200000,emoji:"👻"},"Eternal Flame":{rarity:"Mythic",price:225000,emoji:"🔥"},
  "Starlight Scepter":{rarity:"Mythic",price:250000,emoji:"✨"},"Void Serpent":{rarity:"Mythic",price:300000,emoji:"🐍"},
  "Space Station":{rarity:"Exotic",price:750000,emoji:"🛰️"},"Black Hole":{rarity:"Exotic",price:900000,emoji:"🕳️"},
  "Nebula Crystal":{rarity:"Exotic",price:1000000,emoji:"💫"},"Quantum String":{rarity:"Exotic",price:1200000,emoji:"⚛️"},
  "Cosmic Vortex":{rarity:"Exotic",price:1350000,emoji:"🌀"},"Dimensional Rift":{rarity:"Exotic",price:1500000,emoji:"🌌"},
  "Angel Wings":{rarity:"Divine",price:5000000,emoji:"🪽"},"Golden Castle":{rarity:"Divine",price:7500000,emoji:"🏰"},
  "Celestial Harp":{rarity:"Divine",price:9000000,emoji:"🎶"},"Divine Blessing":{rarity:"Divine",price:10000000,emoji:"☀️"},
  "Eternal Garden":{rarity:"Divine",price:12500000,emoji:"🏵️"},"Holy Grail":{rarity:"Divine",price:15000000,emoji:"⚱️"},
  "Infinity Core":{rarity:"Zenith",price:50000000,emoji:"🌌"},"Godly Scepter":{rarity:"Zenith",price:60000000,emoji:"🔱"},
  "Universe Stone":{rarity:"Zenith",price:70000000,emoji:"🔮"},"Eternal Hourglass":{rarity:"Zenith",price:80000000,emoji:"⏳"},
  "Omniscience Tome":{rarity:"Zenith",price:90000000,emoji:"📖"},"Transcendence Orb":{rarity:"Zenith",price:100000000,emoji:"✨"},
};

function itemsByRarity(...r){return Object.keys(ITEMS).filter(k=>r.includes(ITEMS[k].rarity));}
function rep(arr,n){let o=[];for(let i=0;i<n;i++)o=o.concat(arr);return o;}

const CASES = {
  "Wooden":       {cost:75,       emoji:"📦",jewel_range:[50,200],          drop_table:[...rep(itemsByRarity("Common","Rare"),500),...itemsByRarity("Mythic")]},
  "Iron":         {cost:100,      emoji:"📫",jewel_range:[75,300],          drop_table:[...rep(itemsByRarity("Common","Rare"),500),...itemsByRarity("Mythic")]},
  "Bronze":       {cost:250,      emoji:"🏺",jewel_range:[150,600],         drop_table:[...rep(itemsByRarity("Rare","Epic"),500),...itemsByRarity("Exotic")]},
  "Silver":       {cost:500,      emoji:"🎁",jewel_range:[300,1200],        drop_table:[...rep(itemsByRarity("Rare","Epic"),500),...itemsByRarity("Exotic")]},
  "Gold":         {cost:1000,     emoji:"💝",jewel_range:[500,2000],        drop_table:[...rep(itemsByRarity("Rare","Epic"),500),...itemsByRarity("Exotic")]},
  "Platinum":     {cost:2500,     emoji:"🔱",jewel_range:[1000,5000],       drop_table:[...rep(itemsByRarity("Epic","Legendary"),500),...itemsByRarity("Exotic")]},
  "Emerald":      {cost:5000,     emoji:"💚",jewel_range:[2000,10000],      drop_table:[...rep(itemsByRarity("Epic","Legendary"),500),...itemsByRarity("Exotic")]},
  "Diamond":      {cost:10000,    emoji:"💎",jewel_range:[5000,25000],      drop_table:[...rep(itemsByRarity("Epic","Legendary"),500),...itemsByRarity("Exotic")]},
  "Crystal":      {cost:25000,    emoji:"✨",jewel_range:[15000,60000],     drop_table:[...rep(itemsByRarity("Legendary"),999),...itemsByRarity("Divine")]},
  "Legendary":    {cost:50000,    emoji:"🌟",jewel_range:[60000,300000],    drop_table:[...rep(itemsByRarity("Epic","Legendary"),50),...rep(itemsByRarity("Mythic"),10),...itemsByRarity("Exotic"),...itemsByRarity("Divine")]},
  "Mythic":       {cost:250000,   emoji:"🔥",jewel_range:[100000,500000],   drop_table:[...rep(itemsByRarity("Epic","Legendary"),20),...rep(itemsByRarity("Mythic"),50),...rep(itemsByRarity("Exotic"),5),...itemsByRarity("Divine")]},
  "Divine":       {cost:2000000,  emoji:"☀️",jewel_range:[500000,2000000],  drop_table:[...rep(itemsByRarity("Legendary"),829),...rep(itemsByRarity("Mythic"),150),...rep(itemsByRarity("Exotic"),20),...itemsByRarity("Divine"),...itemsByRarity("Zenith")]},
  "Emerald Case": {cost:1500000,  emoji:"💚",jewel_range:[750000,3000000],  drop_table:[...rep(itemsByRarity("Epic","Legendary"),499),...itemsByRarity("Mythic")]},
  "Obsidian Case":{cost:7500000,  emoji:"🖤",jewel_range:[2000000,8000000], drop_table:[...rep(itemsByRarity("Legendary"),150),...rep(itemsByRarity("Mythic"),50),...itemsByRarity("Exotic")]},
  "Galactic Case":{cost:35000000, emoji:"🌌",jewel_range:[8000000,20000000],drop_table:[...rep(itemsByRarity("Mythic"),600),...rep(itemsByRarity("Exotic"),300),...rep(itemsByRarity("Divine"),100),...itemsByRarity("Zenith")]},
  "Zenith":       {cost:15000000, emoji:"⭐",jewel_range:[2000000,10000000],drop_table:[...rep(itemsByRarity("Epic","Legendary"),20),...rep(itemsByRarity("Mythic"),50),...rep(itemsByRarity("Exotic"),20),...rep(itemsByRarity("Divine"),10),...itemsByRarity("Zenith")]},
};

const SAVE_KEY = "jewel_case_v3";
let balance=10000, inventory={}, selectedItem=null;
let animating=false, boxOpened=false, rewardClaimed=false, pendingDrop=null, animTimer=null;
let giftActive=false, giftCase=null, giftStart=null, giftInt=null;

function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({balance,inventory}));}catch(e){}}
function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||"{}");
    if(typeof d.balance==="number")balance=d.balance;
    if(d.inventory)for(const[k,v]of Object.entries(d.inventory))
      if(ITEMS[k]&&parseInt(v)>0)inventory[k]=parseInt(v);
  }catch(e){}
}

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function fmt(n){return n.toLocaleString();}

function getTopRarity(caseName){
  const dt=CASES[caseName].drop_table, counts={};
  for(const r of RARITY_ORDER)counts[r]=0;
  for(const i of dt)counts[ITEMS[i].rarity]++;
  for(const r of [...RARITY_ORDER].reverse())if(counts[r]>0)return r;
  return "Common";
}

function updateBalance(){document.getElementById("balance-label").textContent=`${JEWEL} ${fmt(balance)}`;}

function updateInventory(){
  const list=document.getElementById("inventory-list");
  list.innerHTML="";
  const sorted=Object.keys(inventory).sort((a,b)=>{
    const ri2=r=>RARITY_ORDER.indexOf(ITEMS[r].rarity);
    return ri2(b)-ri2(a)||a.localeCompare(b);
  });
  if(!sorted.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.18);font-size:13px;letter-spacing:1px;line-height:1.8">No items yet<br>Open some cases!</div>';
    return;
  }
  for(const name of sorted){
    const item=ITEMS[name];
    const div=document.createElement("div");
    div.className=`inv-item inv-${item.rarity}${name===selectedItem?" selected":""}`;
    div.innerHTML=`<span style="font-size:16px">${item.emoji}</span><span>${name} <span style="opacity:0.4">×${inventory[name]}</span></span>`;
    div.onclick=()=>selectItem(name);
    list.appendChild(div);
  }
}

function selectItem(name){
  selectedItem=name; updateInventory(); showPreview();
}

function showPreview(){
  if(!selectedItem||!inventory[selectedItem])return;
  const item=ITEMS[selectedItem], color=RARITY_COLORS[item.rarity];
  document.getElementById("preview-emoji").textContent=item.emoji;
  document.getElementById("preview-emoji").style.filter=`drop-shadow(0 0 18px ${color})`;
  document.getElementById("preview-name").textContent=`${selectedItem} ×${inventory[selectedItem]}`;
  const re=document.getElementById("preview-rarity");
  re.textContent=item.rarity.toUpperCase();
  re.style.color=color; re.style.textShadow=`0 0 12px ${color}`;
  document.getElementById("preview-price").textContent=`Sell: ${fmt(Math.floor(item.price*0.8))} ${JEWEL}`;
  document.getElementById("sell-btn").disabled=false;
}

function clearPreview(){
  ["preview-emoji","preview-name","preview-rarity","preview-price"].forEach(id=>document.getElementById(id).textContent="");
  document.getElementById("preview-emoji").style.filter="";
  document.getElementById("sell-btn").disabled=true;
}

document.getElementById("sell-btn").onclick=function(){
  if(!selectedItem||!inventory[selectedItem])return;
  const sp=Math.floor(ITEMS[selectedItem].price*0.8);
  if(inventory[selectedItem]>1)inventory[selectedItem]--;
  else{delete inventory[selectedItem];selectedItem=null;}
  balance+=sp; updateBalance(); updateInventory(); saveGame();
  if(selectedItem&&inventory[selectedItem])showPreview(); else clearPreview();
};

function buildShop(){
  const grid=document.getElementById("cases-grid"); grid.innerHTML="";
  for(const[name,data]of Object.entries(CASES)){
    const top=getTopRarity(name), color=RARITY_COLORS[top];
    const card=document.createElement("div");
    card.className=`case-card r-${top}`;
    card.innerHTML=`<div class="case-card-inner">
      <div class="case-emoji" style="filter:drop-shadow(0 0 8px ${color})">${data.emoji}</div>
      <div class="case-name">${name}</div>
      <div class="case-cost" style="color:${color};opacity:0.8">${fmt(data.cost)} ${JEWEL}</div>
    </div>`;
    card.onclick=()=>openCase(name);
    grid.appendChild(card);
  }
}

function openCase(name){
  if(animating)return;
  const data=CASES[name]; let cost=data.cost;
  if(giftActive&&giftCase===name){
    cost=0; clearInterval(giftInt); giftActive=false; giftCase=null;
    document.getElementById("gift-label").textContent=""; scheduleGift();
  }
  if(balance<cost){alert(`Need ${fmt(cost)} ${JEWEL}`);return;}
  balance-=cost; updateBalance();
  if(Math.random()<0.5){
    const dt=data.drop_table; pendingDrop={type:"item",payload:dt[ri(0,dt.length-1)]};
  } else {
    const[lo,hi]=data.jewel_range;
    pendingDrop={type:"jewels",payload:Math.round(ri(Math.floor(lo/50),Math.floor(hi/50))*50)};
  }
  showBox(name);
}

function showBox(name){
  animating=true; boxOpened=false; rewardClaimed=false;
  const ov=document.getElementById("fullscreen-overlay");
  ov.classList.add("active"); ov.onclick=onBoxClick;
  const icon=document.getElementById("box-icon");
  icon.textContent=CASES[name].emoji;
  icon.style.cssText=""; icon.className="";
  void icon.offsetWidth;
  icon.style.animation="iconFloat 3s ease-in-out infinite";
  document.getElementById("fs-glow").style.background="radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%)";
  document.getElementById("fs-ring").style.borderColor="rgba(0,212,255,0.18)";
  document.getElementById("fs-ring2").style.borderColor="rgba(123,47,255,0.12)";
  const instr=document.getElementById("instruction-label");
  instr.textContent="Click to Open"; instr.style.color=""; instr.style.textShadow="";
  instr.style.animation="labelPulse 1.4s ease-in-out infinite alternate";
  const sub=document.getElementById("subtext-label");
  sub.textContent=""; sub.style.color="";
  document.getElementById("back-btn").style.display="none";
}

function onBoxClick(){
  if(animating&&!boxOpened){
    boxOpened=true;
    const icon=document.getElementById("box-icon");
    icon.style.animation="none"; icon.className="";
    playAnim();
  } else if(boxOpened&&!rewardClaimed){
    rewardClaimed=true;
    document.getElementById("instruction-label").textContent="";
    document.getElementById("subtext-label").textContent="";
    document.getElementById("back-btn").style.display="block";
    document.getElementById("fullscreen-overlay").onclick=null;
  }
}

function playAnim(){
  const icon=document.getElementById("box-icon");
  const start=performance.now(), dur=800;
  function frame(now){
    const el=now-start;
    if(el<dur){
      const p=el/dur, amp=Math.round(22*(1-p));
      icon.style.transform=`translate(${ri(-amp,amp)}px,${ri(-Math.floor(amp/2),Math.floor(amp/2))}px) scale(${1+0.35*p})`;
      animTimer=requestAnimationFrame(frame);
    } else {
      icon.style.transform=""; reveal();
    }
  }
  animTimer=requestAnimationFrame(frame);
}

function reveal(){
  if(!pendingDrop)return;
  const icon=document.getElementById("box-icon");
  const instr=document.getElementById("instruction-label");
  const sub=document.getElementById("subtext-label");
  const glow=document.getElementById("fs-glow");
  const ring=document.getElementById("fs-ring");
  const ring2=document.getElementById("fs-ring2");

  instr.style.animation="none";

  if(pendingDrop.type==="item"){
    const name=pendingDrop.payload, item=ITEMS[name], color=RARITY_COLORS[item.rarity];
    icon.textContent=item.emoji;
    icon.style.fontSize="160px";
    icon.className=`glow-${item.rarity}`;
    glow.style.background=`radial-gradient(circle, ${color}20 0%, transparent 70%)`;
    ring.style.borderColor=color+"44";
    ring2.style.borderColor=color+"22";
    instr.textContent=`You got: ${name}!`;
    instr.style.color=color; instr.style.textShadow=`0 0 30px ${color}, 0 0 60px ${color}88`;
    sub.textContent=`✦ ${item.rarity.toUpperCase()} ✦`;
    sub.style.color=color;
    if(inventory[name])inventory[name]++; else inventory[name]=1;
  } else {
    const amount=pendingDrop.payload;
    icon.textContent=JEWEL; icon.style.fontSize="140px";
    icon.className="glow-Legendary";
    icon.style.animation="iconFloat 3s ease-in-out infinite";
    glow.style.background="radial-gradient(circle, rgba(0,212,255,0.18) 0%, transparent 70%)";
    instr.textContent=`+${fmt(amount)} ${JEWEL}`;
    instr.style.color="#00d4ff"; instr.style.textShadow="0 0 40px #00d4ff, 0 0 80px #00d4ff66";
    sub.textContent="Jewels Earned!"; sub.style.color="rgba(0,212,255,0.7)";
    balance+=amount;
  }

  updateBalance(); updateInventory(); saveGame();
  setTimeout(()=>{ sub.textContent="✦ Click to Claim ✦"; },700);
}

function endFullscreen(){
  if(animTimer){cancelAnimationFrame(animTimer);animTimer=null;}
  document.getElementById("fullscreen-overlay").classList.remove("active");
  document.getElementById("fullscreen-overlay").onclick=null;
  animating=false; boxOpened=false; rewardClaimed=false; pendingDrop=null;
}
window.endFullscreen=endFullscreen;

function scheduleGift(){setTimeout(activateGift,ri(300,600)*1000);}
function activateGift(){
  giftCase=Object.keys(CASES)[ri(0,Object.keys(CASES).length-1)];
  giftActive=true; giftStart=Date.now();
  giftInt=setInterval(tickGift,1000); tickGift();
}
function tickGift(){
  const rem=60-(Date.now()-giftStart)/1000;
  if(rem>0){
    document.getElementById("gift-label").textContent=`${GIFT} ${giftCase} FREE! ${HOURGLASS} ${Math.ceil(rem)}s`;
  } else {
    clearInterval(giftInt); giftActive=false; giftCase=null;
    document.getElementById("gift-label").textContent=""; scheduleGift();
  }
}

loadGame(); buildShop(); updateBalance(); updateInventory(); scheduleGift();
</script>
</body>
</html>
