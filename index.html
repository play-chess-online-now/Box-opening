<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💎 Jewel Case Simulator ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --accent: #00f2ff;
  --panel: rgba(255, 255, 255, 0.05);
  --Common: #b5bdc9; --Rare: #0077ff; --Epic: #a200ff;
  --Legendary: #ffaa00; --Mythic: #ff0077; --Exotic: #00ffa2;
  --Divine: #ffea00; --Zenith: #ff3c00;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* --- NAPRAWIONY HEADER --- */
#top-bar {
  position: sticky;
  top: 0; z-index: 100;
  padding: 15px 25px;
  background: #0a0a15;
  border-bottom: 3px solid var(--accent);
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
}

#balance-display { font-size: 28px; font-weight: 700; color: #ffd700; }

.container {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 30px 0 20px 0;
}

.section-title {
  font-size: 22px; text-transform: uppercase; letter-spacing: 3px;
  color: var(--accent); border-left: 5px solid var(--accent);
  padding-left: 15px; font-weight: 700;
}

#clicker-btn {
  background: linear-gradient(45deg, #ffd700, #ffaa00);
  border: none; padding: 10px 20px; border-radius: 8px;
  color: #000; font-weight: 800; cursor: pointer;
  text-transform: uppercase; transition: 0.2s;
}
#clicker-btn:active { transform: scale(0.95); }

/* --- NAPRAWIONA SIATKA SKLEPU --- */
#shop-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
  gap: 20px;
  width: 100%;
}

.case-item {
  background: var(--panel);
  border-radius: 20px; padding: 30px 15px; text-align: center;
  border: 2px solid rgba(255,255,255,0.1); cursor: pointer;
  transition: 0.3s;
}
.case-item:hover { transform: translateY(-8px); border-color: var(--accent); }

.case-emoji { font-size: 60px; display: block; margin-bottom: 15px; }
.case-name { font-weight: 700; font-size: 18px; display: block; margin-bottom: 8px; }
.case-price { color: #ffd700; font-weight: 700; font-size: 16px; }

/* --- INWENTARZ --- */
#inventory-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 12px;
  margin-bottom: 50px;
}

.inv-item {
  aspect-ratio: 1; border-radius: 15px; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  font-size: 35px; border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer; position: relative; background: rgba(255,255,255,0.03);
}
.inv-item .sell-price {
    font-size: 10px; position: absolute; bottom: 5px;
    color: #ffd700; font-weight: 800; background: rgba(0,0,0,0.7);
    padding: 2px 6px; border-radius: 4px;
}

/* --- EKRAN OTWIERANIA --- */
#opening-screen {
  position: fixed; inset: 0;
  background: radial-gradient(circle, #1a1a2e 0%, #050508 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 2000;
}

#big-box { font-size: 180px; cursor: pointer; }

.shake { animation: shakeAnim 0.15s infinite; }
@keyframes shakeAnim {
  0% { transform: rotate(0); }
  25% { transform: rotate(5deg); }
  75% { transform: rotate(-5deg); }
}

.explode { animation: explodeAnim 0.5s forwards; }
@keyframes explodeAnim {
  100% { transform: scale(5); opacity: 0; filter: brightness(5); }
}

#spinner-wrap { display: none; width: 100%; flex-direction: column; align-items: center; }
#spinner-container {
  position: relative; width: 90%; max-width: 600px; height: 140px;
  background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1);
  margin: 30px 0; overflow: hidden; border-radius: 15px;
}

#spinner-track {
  display: flex; position: absolute; left: 0; height: 100%;
  align-items: center; transition: transform 6s cubic-bezier(0.1, 0, 0.05, 1);
}

.spinner-card {
  min-width: 120px; height: 120px; margin: 0 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 60px; background: rgba(255,255,255,0.05); border-radius: 12px;
}

#spinner-line {
  position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
  background: var(--accent); z-index: 10; transform: translateX(-50%);
}

#claim-area { display: none; text-align: center; }
#claim-btn {
  padding: 18px 50px; background: var(--accent); border: none; border-radius: 50px;
  color: #000; font-weight: 900; font-size: 20px; cursor: pointer;
}

/* KLASY RZADKOŚCI */
.Common { border-color: var(--Common) !important; color: var(--Common); }
.Rare { border-color: var(--Rare) !important; color: var(--Rare); }
.Epic { border-color: var(--Epic) !important; color: var(--Epic); }
.Legendary { border-color: var(--Legendary) !important; color: var(--Legendary); }
.Mythic { border-color: var(--Mythic) !important; color: var(--Mythic); }
.Exotic { border-color: var(--Exotic) !important; color: var(--Exotic); }
.Divine { border-color: var(--Divine) !important; color: var(--Divine); }
.Zenith { border-color: var(--Zenith) !important; color: var(--Zenith); text-shadow: 0 0 15px var(--Zenith); }
</style>
</head>
<body>

<div id="main-menu" style="display: flex; flex-direction: column;">
  <div id="top-bar">
    <div style="font-family: 'Exo 2', sans-serif; font-weight: 900; color: var(--accent); font-size: 22px;">JEWEL SIM ULTRA</div>
    <div id="balance-display">💎 10,000</div>
  </div>

  <div class="container">
    <div class="section-header">
        <h2 class="section-title">Case Market</h2>
        <button id="clicker-btn" onclick="mineGems()">WYKOP DIAMENTY (+10)</button>
    </div>
    <div id="shop-grid"></div>

    <div class="section-header">
        <h2 class="section-title">Inventory</h2>
    </div>
    <div id="inventory-grid"></div>
  </div>
</div>

<div id="opening-screen">
  <div id="big-box">📦</div>
  <div id="tap-info" style="margin-top: 30px; font-weight: 700; color: var(--accent); font-size: 22px;">KLIKNIJ SKRZYNKĘ!</div>
  
  <div id="spinner-wrap">
    <div id="spinner-container">
      <div id="spinner-line"></div>
      <div id="spinner-track"></div>
    </div>
  
    <div id="claim-area">
      <div id="win-name" style="font-size: 35px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase;">ITEM</div>
      <button id="claim-btn" onclick="collectReward()">ODBIERZ I WRÓĆ</button>
    </div>
  </div>
</div>

<script>
const ITEMS = {
  "Stick": {r:"Common", e:"🪵", p:50}, "Shoe": {r:"Common", e:"👞", p:50}, "Bone": {r:"Common", e:"🦴", p:50},
  "Sword": {r:"Rare", e:"⚔️", p:300}, "Shield": {r:"Rare", e:"🛡️", p:300}, "Bow": {r:"Rare", e:"🏹", p:300},
  "Orb": {r:"Epic", e:"🔮", p:1500}, "Trident": {r:"Epic", e:"🔱", p:1500}, "Axe": {r:"Epic", e:"🪓", p:1500},
  "Crown": {r:"Legendary", e:"👑", p:10000}, "Key": {r:"Legendary", e:"🔑", p:10000},
  "Phoenix": {r:"Mythic", e:"🐦‍🔥", p:150000}, "Void Serpent": {r:"Mythic", e:"🐍", p:300000},
  "Black Hole": {r:"Exotic", e:"🕳️", p:900000}, "Cosmic Vortex": {r:"Exotic", e:"🌀", p:1300000},
  "Angel Wings": {r:"Divine", e:"🪽", p:5000000}, "Holy Grail": {r:"Divine", e:"⚱️", p:15000000},
  "Infinity Core": {r:"Zenith", e:"🌌", p:50000000}, "Godly Scepter": {r:"Zenith", e:"🔱", p:60000000}
};

const CASES = {
  "Wooden": {cost:100, e:"📦", drops:["Stick", "Shoe", "Bone", "Sword"]},
  "Iron": {cost:500, e:"📫", drops:["Sword", "Shield", "Bow", "Orb"]},
  "Bronze": {cost:2000, e:"🏺", drops:["Shield", "Orb", "Trident", "Axe"]},
  "Silver": {cost:10000, e:"🎁", drops:["Orb", "Axe", "Crown", "Key"]},
  "Gold": {cost:50000, e:"💝", drops:["Crown", "Key", "Phoenix"]},
  "Legendary": {cost:250000, e:"🌟", drops:["Phoenix", "Void Serpent", "Black Hole"]},
  "Mythic": {cost:1000000, e:"🔥", drops:["Void Serpent", "Black Hole", "Cosmic Vortex"]},
  "Divine": {cost:5000000, e:"☀️", drops:["Cosmic Vortex", "Angel Wings", "Holy Grail", "Infinity Core"]},
  "Omega": {cost:25000000, e:"🧬", drops:["Holy Grail", "Infinity Core", "Godly Scepter"]}
};

let balance = 10000;
let inventory = [];
let pendingDrop = null;

function init() {
  const shop = document.getElementById("shop-grid");
  shop.innerHTML = "";
  Object.keys(CASES).forEach(name => {
    const c = CASES[name];
    const div = document.createElement("div");
    div.className = "case-item";
    div.onclick = () => buyCase(name);
    div.innerHTML = `<span class="case-emoji">${c.e}</span><span class="case-name">${name}</span><span class="case-price">💎 ${c.cost.toLocaleString()}</span>`;
    shop.appendChild(div);
  });
  loadGame();
  updateUI();
}

function mineGems() {
    balance += 10;
    updateUI();
    saveGame();
}

function buyCase(name) {
  const c = CASES[name];
  if(balance < c.cost) return alert("Za mało klejnotów!");
  balance -= c.cost;
  const pool = c.drops;
  const dropName = pool[Math.floor(Math.random() * pool.length)];
  pendingDrop = { name: dropName, ...ITEMS[dropName], id: Date.now() };
  
  document.getElementById("main-menu").style.display = "none";
  document.getElementById("opening-screen").style.display = "flex";
  const box = document.getElementById("big-box");
  box.style.display = "block";
  box.textContent = c.e;
  box.onclick = handleBoxClick;
  
  document.getElementById("tap-info").style.display = "block";
  document.getElementById("spinner-wrap").style.display = "none";
  document.getElementById("claim-area").style.display = "none";
  updateUI();
}

function handleBoxClick() {
  const box = document.getElementById("big-box");
  box.onclick = null;
  box.classList.add("shake");
  document.getElementById("tap-info").style.display = "none";
  setTimeout(() => {
    box.classList.remove("shake");
    box.classList.add("explode");
    setTimeout(() => {
      box.style.display = "none";
      box.classList.remove("explode");
      showSpinner();
    }, 450);
  }, 1000);
}

function showSpinner() {
  const wrap = document.getElementById("spinner-wrap");
  const track = document.getElementById("spinner-track");
  wrap.style.display = "flex";
  track.innerHTML = "";
  track.style.transition = "none";
  track.style.transform = "translateX(0)";

  const winIdx = 30;
  const keys = Object.keys(ITEMS);
  for(let i=0; i<45; i++) {
    const item = (i === winIdx) ? pendingDrop : ITEMS[keys[Math.floor(Math.random()*keys.length)]];
    const card = document.createElement("div");
    card.className = `spinner-card ${item.r}`;
    card.innerHTML = item.e;
    track.appendChild(card);
  }

  const cardWidth = 130;
  const centerOffset = (winIdx * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
  setTimeout(() => {
    track.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.05, 1)";
    track.style.transform = `translateX(-${centerOffset + (Math.random()*40-20)}px)`;
  }, 50);

  setTimeout(() => {
    document.getElementById("claim-area").style.display = "block";
    const nameLabel = document.getElementById("win-name");
    nameLabel.textContent = pendingDrop.name;
    nameLabel.className = pendingDrop.r;
  }, 6500);
}

function collectReward() {
  inventory.unshift(pendingDrop);
  document.getElementById("opening-screen").style.display = "none";
  // WYMUSZENIE UKŁADU FLEX DLA MENU
  const menu = document.getElementById("main-menu");
  menu.style.display = "flex";
  updateInventoryUI();
  saveGame();
}

function sellItem(id) {
    const index = inventory.findIndex(item => item.id === id);
    if (index !== -1) {
        balance += Math.floor(inventory[index].p * 0.75);
        inventory.splice(index, 1);
        updateUI();
        updateInventoryUI();
        saveGame();
    }
}

function updateUI() {
  document.getElementById("balance-display").textContent = "💎 " + balance.toLocaleString();
}

function updateInventoryUI() {
  const grid = document.getElementById("inventory-grid");
  grid.innerHTML = "";
  inventory.forEach(item => {
    const div = document.createElement("div");
    div.className = `inv-item ${item.r}`;
    div.onclick = () => sellItem(item.id);
    div.innerHTML = `${item.e} <span class="sell-price">💎 ${Math.floor(item.p * 0.75).toLocaleString()}</span>`;
    grid.appendChild(div);
  });
}

function saveGame() {
  localStorage.setItem("jewel_sim_final_ultra", JSON.stringify({b: balance, i: inventory}));
}

function loadGame() {
  const data = localStorage.getItem("jewel_sim_final_ultra");
  if(data) {
    const parsed = JSON.parse(data);
    balance = parsed.b;
    inventory = parsed.i;
    updateInventoryUI();
  }
}

window.onload = init;
</script>
</body>
</html>
