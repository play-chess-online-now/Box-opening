<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Jewel Case Simulator ULTRA</title>

    <!-- PWA: Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- PWA: iOS / Safari support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Case Sim">

    <!-- PWA: Theme color for browser chrome -->
    <meta name="theme-color" content="#00f2ff">

    <!-- PWA: General mobile app meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Case Simulator">
    <meta name="description" content="Open cases, collect rare items, mine diamonds!">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00f2ff;
            /* Rarity Colors */
            --Common: #b5bdc9;
            --Rare: #0077ff;
            --Epic: #a200ff;
            --Legendary: #ffaa00;
            --Mythic: #ff0077;
            --Exotic: #00ffa2;
            --Divine: #ffea00;
            --Zenith: #ff3c00;
            
            /* High Quality Gradients for Boxes */
            --g-Common: linear-gradient(135deg, #3a3d42 0%, #b5bdc9 100%);
            --g-Rare: linear-gradient(135deg, #0044ff 0%, #00d4ff 100%);
            --g-Epic: linear-gradient(135deg, #6a00ff 0%, #e100ff 100%);
            --g-Legendary: linear-gradient(135deg, #ff8800 0%, #ffd000 100%);
            --g-Mythic: linear-gradient(135deg, #d5006d 0%, #ff0055 100%);
            --g-Exotic: linear-gradient(135deg, #00c853 0%, #00ffa2 100%);
            --g-Divine: linear-gradient(135deg, #ffd600 0%, #fff700 100%);
            --g-Zenith: linear-gradient(135deg, #ff0000 0%, #ff6a00 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        #top-bar {
            position: sticky;
            top: 0; z-index: 100;
            padding: 15px 25px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        #balance-display {
            font-size: 30px;
            font-weight: 700; color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .section-header {
            display: flex;
            justify-content: space-between; align-items: center;
            margin: 30px 0 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            font-size: 24px;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); font-weight: 700; border-left: 5px solid var(--accent);
            padding-left: 15px;
        }

        /* Mining buttons group */
        #mining-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #mining-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none; padding: 12px 25px; border-radius: 12px;
            color: #000; font-weight: 800; cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
            font-size: 15px;
        }
        #mining-btn:active { transform: scale(0.95) rotate(2deg); }

        #upgrade-btn {
            background: linear-gradient(45deg, #00c3ff, #00f2ff);
            border: none; padding: 12px 20px; border-radius: 12px;
            color: #000; font-weight: 800; cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
            font-size: 14px;
            white-space: nowrap;
        }
        #upgrade-btn:active { transform: scale(0.95); }
        #upgrade-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        /* --- AUTO MINER BUTTON --- */
        #auto-miner-btn {
            background: linear-gradient(45deg, #7b00ff, #e100ff);
            border: none; padding: 12px 20px; border-radius: 12px;
            color: #fff; font-weight: 800; cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(162, 0, 255, 0.5);
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
            font-size: 14px;
            white-space: nowrap;
        }
        #auto-miner-btn:active { transform: scale(0.95); }
        #auto-miner-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        #auto-miner-btn.active {
            background: linear-gradient(45deg, #00c853, #00ffa2);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 162, 0.6);
            cursor: default;
        }

        /* SHOP GRID */
        #shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .case-card {
            border-radius: 30px;
            padding: 35px 20px;
            text-align: center;
            border: 3px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
        }

        .case-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: rgba(255,255,255,0.5);
            z-index: 5;
        }

        .case-card::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .case-card:hover::before { left: 100%; }

        .case-emoji {
            font-size: 85px;
            display: block; margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .case-name { font-size: 22px; font-weight: 900; display: block; margin-bottom: 12px; letter-spacing: 1px; }

        .case-price-tag {
            background: rgba(0,0,0,0.7);
            padding: 6px 18px;
            border-radius: 50px; font-size: 16px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
        }

        /* INVENTORY */
        #inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .item-slot {
            aspect-ratio: 1;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 48px; border: 2px solid transparent; cursor: pointer;
            transition: 0.3s;
            position: relative;
            background: rgba(255,255,255,0.05);
        }
        .item-slot:hover { transform: scale(1.1) rotate(3deg); z-index: 2; }

        .price-tag {
            font-size: 12px;
            position: absolute; bottom: 8px;
            color: #ffd700; font-weight: 800; background: rgba(0,0,0,0.85);
            padding: 3px 10px; border-radius: 8px; border: 1px solid rgba(255,215,0,0.3);
        }

        /* --- SELL ALL BUTTON --- */
        #sell-trash-btn {
            background: linear-gradient(45deg, #ff4444, #ff8800);
            border: none; padding: 10px 20px; border-radius: 12px;
            color: #fff; font-weight: 800; cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 18px rgba(255, 68, 68, 0.4);
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
            font-size: 14px;
            white-space: nowrap;
        }
        #sell-trash-btn:hover { transform: scale(1.05); box-shadow: 0 0 28px rgba(255,68,68,0.7); }
        #sell-trash-btn:active { transform: scale(0.97); }

        /* --- COLLECTION BOOK --- */
        #collection-section {
            margin-bottom: 60px;
        }

        #collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .col-slot {
            aspect-ratio: 1;
            border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 42px;
            border: 2px solid rgba(255,255,255,0.08);
            position: relative;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
            overflow: hidden;
        }

        .col-slot.unlocked {
            border-color: rgba(255,255,255,0.25);
            cursor: default;
        }

        .col-slot.unlocked:hover {
            transform: scale(1.08);
            z-index: 2;
        }

        .col-slot.locked {
            filter: grayscale(1);
            opacity: 0.22;
            cursor: default;
        }

        .col-slot .col-label {
            font-size: 10px;
            position: absolute; bottom: 6px;
            color: rgba(255,255,255,0.7); font-weight: 700;
            background: rgba(0,0,0,0.7);
            padding: 2px 7px; border-radius: 6px;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .col-slot.locked .col-label {
            display: none;
        }

        .col-slot .col-q {
            font-size: 28px;
            font-weight: 900;
            color: rgba(255,255,255,0.4);
        }

        /* Auto-miner passive income ticker */
        #miner-ticker {
            display: none;
            font-size: 13px;
            color: #00ffa2;
            font-weight: 700;
            background: rgba(0,255,162,0.08);
            border: 1px solid rgba(0,255,162,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            animation: tickerPulse 2s infinite;
        }
        @keyframes tickerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* --- OPENING SCREEN --- */
        #opening-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        #opening-box { font-size: 240px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); }
        
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(0,0); }
            50% { transform: translate(8px, 4px) rotate(4deg); }
            100% { transform: translate(-8px, -4px) rotate(-4deg); }
        }

        .explode { animation: explodeAnim 0.6s forwards cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        @keyframes explodeAnim {
            100% { transform: scale(8); opacity: 0; filter: blur(30px) brightness(10); }
        }

        /* SPINNER */
        #spinner-wrap { display: none; width: 100%; flex-direction: column; align-items: center; }
        #spinner-view {
            position: relative;
            width: 100%; max-width: 700px; height: 200px;
            background: rgba(0,0,0,0.9); border-top: 4px solid var(--accent);
            border-bottom: 4px solid var(--accent); margin: 40px 0; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1) inset;
        }
        #spinner-rail {
            display: flex;
            position: absolute; left: 0; height: 100%;
            align-items: center; transition: transform 6s cubic-bezier(0.05, 0, 0.05, 1);
        }
        .spinner-item {
            min-width: 160px;
            height: 160px; margin: 0 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 90px; background: rgba(255,255,255,0.03);
            border-radius: 30px;
            border: 4px solid transparent;
        }
        #spinner-line {
            position: absolute;
            left: 50%; top: 0; width: 6px; height: 100%;
            background: #fff; z-index: 100; box-shadow: 0 0 25px #fff; transform: translateX(-50%);
        }

        #reward-ui { display: none; text-align: center; animation: rewardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes rewardPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #reward-name { font-size: 50px; font-weight: 900; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; }
        #collect-btn {
            padding: 22px 90px;
            background: #fff; border: none; border-radius: 100px;
            color: #000; font-weight: 900; font-size: 26px; cursor: pointer;
            box-shadow: 0 0 40px rgba(255,255,255,0.5);
            text-transform: uppercase;
            transition: 0.3s;
        }
        #collect-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px rgba(255,255,255,0.8); }

        /* RARITY SYSTEM - COLORS & GLOWS */
        .Common { background: var(--g-Common); border-color: var(--Common); box-shadow: 0 0 20px rgba(181,189,201,0.4); color: var(--Common); text-shadow: 0 0 10px var(--Common); }
        .Rare { background: var(--g-Rare); border-color: var(--Rare); box-shadow: 0 0 25px rgba(0,119,255,0.5); color: var(--Rare); text-shadow: 0 0 10px var(--Rare); }
        .Epic { background: var(--g-Epic); border-color: var(--Epic); box-shadow: 0 0 30px rgba(162,0,255,0.6); color: var(--Epic); text-shadow: 0 0 10px var(--Epic); }
        .Legendary { background: var(--g-Legendary); border-color: var(--Legendary); box-shadow: 0 0 35px rgba(255,170,0,0.7); color: var(--Legendary); text-shadow: 0 0 15px var(--Legendary); }
        .Mythic { background: var(--g-Mythic); border-color: var(--Mythic); box-shadow: 0 0 45px rgba(255,0,119,0.8); color: var(--Mythic); text-shadow: 0 0 20px var(--Mythic); }
        .Exotic { background: var(--g-Exotic); border-color: var(--Exotic); box-shadow: 0 0 50px rgba(0,255,162,0.9); color: var(--Exotic); text-shadow: 0 0 20px var(--Exotic); }
        .Divine { background: var(--g-Divine); border-color: var(--Divine); box-shadow: 0 0 60px rgba(255,234,0,1); color: var(--Divine); text-shadow: 0 0 25px var(--Divine); }
        .Zenith { background: var(--g-Zenith); border-color: var(--Zenith); box-shadow: 0 0 80px rgba(255,60,0,1); color: var(--Zenith); text-shadow: 0 0 30px var(--Zenith); }
    </style>
</head>
<body>

<div id="main-menu">
    <div id="top-bar">
        <div style="font-family: 'Exo 2', sans-serif; font-weight: 900; color: var(--accent); font-size: 26px; letter-spacing: 2px;">CASE SIMULATOR ULTRA</div>
        <div id="balance-display">💎 1,000</div>
    </div>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Case Market</h2>
            <div id="mining-controls">
                <button id="mining-btn" onclick="mine()">Mine Diamonds (+<span id="mine-power">10</span>)</button>
                <button id="upgrade-btn" onclick="upgradePickaxe()">⛏️ Upgrade Pickaxe – 💎 <span id="upgrade-cost-display">1,000</span></button>
                <button id="auto-miner-btn" onclick="hireAutoMiner()">🤖 Hire Auto-Miner – 💎 50,000</button>
                <span id="miner-ticker">⚡ +<span id="miner-rate">0</span>/sec</span>
            </div>
        </div>
        <div id="shop-grid"></div>

        <div class="section-header">
            <h2 class="section-title">Inventory</h2>
            <button id="sell-trash-btn" onclick="sellAllTrash()">🗑️ Sell All Common &amp; Rare</button>
        </div>
        <div id="inventory-grid"></div>

        <!-- COLLECTION BOOK -->
        <div id="collection-section">
            <div class="section-header">
                <h2 class="section-title">📖 Collection Book</h2>
                <span style="font-size:15px; color:rgba(255,255,255,0.45); font-weight:700; letter-spacing:2px;">
                    <span id="col-count">0</span> / 19 DISCOVERED
                </span>
            </div>
            <div id="collection-grid"></div>
        </div>
    </div>
</div>

<div id="opening-screen">
    <div id="opening-box">📦</div>
    <div id="tap-info" style="margin-top: 50px; font-weight: 900; color: #fff; font-size: 32px; letter-spacing: 5px; text-shadow: 0 0 20px rgba(0,0,0,0.5);">CLICK TO OPEN!</div>
    
    <div id="spinner-wrap">
        <div id="spinner-view">
            <div id="spinner-line"></div>
            <div id="spinner-rail"></div>
        </div>
        <div id="reward-ui">
            <div id="reward-name">ITEM</div>
            <button id="collect-btn" onclick="collect()">COLLECT</button>
        </div>
    </div>
</div>

<script>
// --- FULL ITEM DATABASE (19 items) ---
const ITEMS = {
    "Rusty Nail":   {r:"Common",    e:"🔩",  p:35},
    "Old Boot":     {r:"Common",    e:"🥾",  p:50},
    "Sharp Stone":  {r:"Common",    e:"🪨",  p:65},
    "Iron Sword":   {r:"Rare",      e:"⚔️",  p:420},
    "Steel Shield": {r:"Rare",      e:"🛡️",  p:480},
    "Hunter Bow":   {r:"Rare",      e:"🏹",  p:550},
    "Magic Wand":   {r:"Epic",      e:"🪄",  p:2800},
    "Sea Trident":  {r:"Epic",      e:"🔱",  p:3200},
    "Heavy Axe":    {r:"Epic",      e:"🪓",  p:3800},
    "Royal Crown":  {r:"Legendary", e:"👑",  p:22000},
    "Ancient Key":  {r:"Legendary", e:"🔑",  p:28000},
    "Fire Phoenix": {r:"Mythic",    e:"🐦‍🔥", p:280000},
    "Void Dragon":  {r:"Mythic",    e:"🐉",  p:550000},
    "Singularity":  {r:"Exotic",    e:"🕳️",  p:2200000},
    "Nebula Core":  {r:"Exotic",    e:"🌀",  p:3800000},
    "Divine Wings": {r:"Divine",    e:"🪽",  p:15000000},
    "Holy Grail":   {r:"Divine",    e:"⚱️",  p:35000000},
    "Infinity Eye": {r:"Zenith",    e:"👁️",  p:100000000},
    "God Scepter":  {r:"Zenith",    e:"🔱",  p:200000000}
};

// --- CASES DATABASE (10 cases) ---
const CASES = [
    {id:"WOODEN",  cost:100,    e:"📦", r:"Common",    drops:["Rusty Nail","Old Boot","Sharp Stone","Iron Sword"]},
    {id:"IRON",    cost:500,    e:"📦", r:"Rare",      drops:["Iron Sword","Steel Shield","Hunter Bow"]},
    {id:"STEEL",   cost:1000,   e:"🧰", r:"Rare",      drops:["Steel Shield","Hunter Bow","Magic Wand"]},
    {id:"EMERALD", cost:5000,   e:"🍱", r:"Epic",      drops:["Magic Wand","Sea Trident","Heavy Axe"]},
    {id:"SILVER",  cost:10000,  e:"🧰", r:"Epic",      drops:["Sea Trident","Heavy Axe","Royal Crown"]},
    {id:"GOLDEN",  cost:25000,  e:"💼", r:"Legendary", drops:["Royal Crown","Ancient Key","Fire Phoenix"]},
    {id:"VOID",    cost:50000,  e:"💼", r:"Mythic",    drops:["Fire Phoenix","Void Dragon","Singularity"]},
    {id:"COSMIC",  cost:100000, e:"💼", r:"Exotic",    drops:["Void Dragon","Singularity","Nebula Core"]},
    {id:"DIVINE",  cost:150000, e:"🎁", r:"Divine",    drops:["Nebula Core","Divine Wings","Holy Grail"]},
    {id:"OMEGA",   cost:250000, e:"🎁", r:"Zenith",    drops:["Holy Grail","Infinity Eye","God Scepter"]}
];

// -------------------------------------------------------
// WEIGHTED RNG
// -------------------------------------------------------
const RARITY_WEIGHTS = {
    "Common":    5000,
    "Rare":      2000,
    "Epic":       500,
    "Legendary":  100,
    "Mythic":      15,
    "Exotic":       4,
    "Divine":       1.2,
    "Zenith":       0.3
};

function weightedDrop(dropNames) {
    const pool = dropNames.map(name => ({
        name,
        weight: RARITY_WEIGHTS[ITEMS[name].r] || 1
    }));
    const total = pool.reduce((sum, e) => sum + e.weight, 0);
    let roll = Math.random() * total;
    for (const entry of pool) {
        roll -= entry.weight;
        if (roll <= 0) return entry.name;
    }
    return pool[pool.length - 1].name;
}

// -------------------------------------------------------
// STATE
// -------------------------------------------------------
let money        = 1000;
let inv          = [];
let pending      = null;
let minePower    = 10;
let upgradeCost  = 1000;
let discovered   = {};   // { "Item Name": true } — collection book unlocks
let autoMiner    = false; // whether auto-miner is hired
const AUTO_MINER_COST = 50000;

// -------------------------------------------------------
// INIT
// -------------------------------------------------------
function init() {
    const shop = document.getElementById("shop-grid");
    shop.innerHTML = "";
    CASES.forEach(c => {
        const card = document.createElement("div");
        card.className = `case-card ${c.r}`;
        card.onclick = () => buy(c);
        card.innerHTML = `
            <span class="case-emoji">${c.e}</span>
            <span class="case-name">${c.id} CASE</span>
            <span class="case-price-tag">💎 ${c.cost.toLocaleString()}</span>
        `;
        shop.appendChild(card);
    });
    load();
    update();
    renderCollectionBook();
    startAutoMinerTick();
}

// -------------------------------------------------------
// MINING + UPGRADES
// -------------------------------------------------------
function mine() {
    money += minePower;
    update();
    save();
}

function upgradePickaxe() {
    if (money < upgradeCost) return;
    money       -= upgradeCost;
    minePower   = Math.floor(minePower * 1.8 + 5);
    upgradeCost = Math.floor(upgradeCost * 3.2);
    update();
    save();
}

// -------------------------------------------------------
// FEATURE 3: AUTO-MINER
// -------------------------------------------------------
function hireAutoMiner() {
    if (autoMiner) return;
    if (money < AUTO_MINER_COST) return alert("Za mało diamentów!");
    money -= AUTO_MINER_COST;
    autoMiner = true;
    update();
    save();
    startAutoMinerTick();
}

let autoMinerInterval = null;
function startAutoMinerTick() {
    if (!autoMiner) return;
    if (autoMinerInterval) return; // already running
    // Update rate display immediately
    updateMinerTicker();
    autoMinerInterval = setInterval(() => {
        const income = Math.max(1, Math.floor(minePower * 0.01));
        money += income;
        update();
        updateMinerTicker();
        // Save every 10 ticks to avoid thrashing localStorage
    }, 1000);
}

function updateMinerTicker() {
    const rate = Math.max(1, Math.floor(minePower * 0.01));
    document.getElementById("miner-rate").textContent = rate.toLocaleString();
    document.getElementById("miner-ticker").style.display = autoMiner ? "inline-block" : "none";
}

// -------------------------------------------------------
// BUY / OPEN
// -------------------------------------------------------
function buy(c) {
    if (money < c.cost) return alert("Za mało diamentów!");
    money -= c.cost;

    const dropName = weightedDrop(c.drops);
    pending = { name: dropName, ...ITEMS[dropName], id: Date.now() + Math.random() };

    document.getElementById("main-menu").style.display = "none";
    const screen = document.getElementById("opening-screen");
    screen.style.display = "flex";

    const box = document.getElementById("opening-box");
    box.style.display = "block";
    box.textContent = c.e;
    box.className = c.r;
    box.onclick = startOpening;

    document.getElementById("tap-info").style.display = "block";
    document.getElementById("spinner-wrap").style.display = "none";
    document.getElementById("reward-ui").style.display = "none";
    update();
}

function startOpening() {
    const box = document.getElementById("opening-box");
    box.onclick = null;
    box.classList.add("shake");
    document.getElementById("tap-info").style.display = "none";
    setTimeout(() => {
        box.classList.remove("shake");
        box.classList.add("explode");
        setTimeout(() => {
            box.style.display = "none";
            box.classList.remove("explode");
            runSpinner();
        }, 550);
    }, 1100);
}

function runSpinner() {
    const wrap = document.getElementById("spinner-wrap");
    const rail = document.getElementById("spinner-rail");
    wrap.style.display = "flex";
    rail.innerHTML = "";
    rail.style.transition = "none";
    rail.style.transform = "translateX(0)";

    const winIdx  = 35;
    const allKeys = Object.keys(ITEMS);

    for (let i = 0; i < 60; i++) {
        const data = (i === winIdx)
            ? pending
            : ITEMS[allKeys[Math.floor(Math.random() * allKeys.length)]];
        const card = document.createElement("div");
        card.className = `spinner-item ${data.r}`;
        card.innerHTML = data.e;
        rail.appendChild(card);
    }

    const itemW  = 184;
    const viewW  = document.getElementById("spinner-view").offsetWidth;
    const offset = (winIdx * itemW) - (viewW / 2) + (itemW / 2);

    setTimeout(() => {
        rail.style.transition = "transform 6s cubic-bezier(0.05, 0, 0.05, 1)";
        const microShift = (Math.random() * 80) - 40;
        rail.style.transform = `translateX(-${offset + microShift}px)`;
    }, 50);

    setTimeout(() => {
        document.getElementById("reward-ui").style.display = "block";
        const txt = document.getElementById("reward-name");
        txt.textContent = pending.name;
        txt.className   = pending.r;
    }, 6600);
}

function collect() {
    inv.unshift(pending);

    // FEATURE 1: unlock in collection book
    if (!discovered[pending.name]) {
        discovered[pending.name] = true;
        renderCollectionBook();
    }

    document.getElementById("opening-screen").style.display = "none";
    document.getElementById("main-menu").style.display = "block";
    renderInv();
    save();
}

// -------------------------------------------------------
// SELL (with confirmation for rare items)
// -------------------------------------------------------
const RARE_RARITIES = new Set(["Epic","Legendary","Mythic","Exotic","Divine","Zenith"]);

function sell(id) {
    const i = inv.findIndex(x => x.id === id);
    if (i === -1) return;
    const item = inv[i];

    if (RARE_RARITIES.has(item.r)) {
        const confirmed = window.confirm(
            `⚠️ Are you sure you want to sell this rare item?\n\n` +
            `${item.e} ${item.name} [${item.r}]\n` +
            `Sell value: 💎 ${Math.floor(item.p * 0.75).toLocaleString()}`
        );
        if (!confirmed) return;
    }

    money += Math.floor(item.p * 0.75);
    inv.splice(i, 1);
    update();
    renderInv();
    save();
}

// -------------------------------------------------------
// FEATURE 2: SELL ALL COMMON & RARE
// -------------------------------------------------------
function sellAllTrash() {
    const trashRarities = new Set(["Common", "Rare"]);
    const toSell = inv.filter(item => trashRarities.has(item.r));
    if (toSell.length === 0) return alert("No Common or Rare items in inventory!");

    const total = toSell.reduce((sum, item) => sum + Math.floor(item.p * 0.75), 0);
    money += total;
    inv = inv.filter(item => !trashRarities.has(item.r));

    update();
    renderInv();
    save();

    // Quick visual feedback
    const btn = document.getElementById("sell-trash-btn");
    const orig = btn.textContent;
    btn.textContent = `✅ Sold ${toSell.length} items for 💎 ${total.toLocaleString()}`;
    btn.style.background = "linear-gradient(45deg, #00c853, #00ffa2)";
    btn.style.color = "#000";
    setTimeout(() => {
        btn.textContent = orig;
        btn.style.background = "";
        btn.style.color = "";
    }, 2500);
}

// -------------------------------------------------------
// FEATURE 1: COLLECTION BOOK RENDER
// -------------------------------------------------------
function renderCollectionBook() {
    const grid = document.getElementById("collection-grid");
    grid.innerHTML = "";

    const allNames = Object.keys(ITEMS);
    let unlockedCount = 0;

    allNames.forEach(name => {
        const itemData = ITEMS[name];
        const isUnlocked = !!discovered[name];
        if (isUnlocked) unlockedCount++;

        const slot = document.createElement("div");
        slot.className = `col-slot ${isUnlocked ? `unlocked ${itemData.r}` : "locked"}`;

        if (isUnlocked) {
            slot.innerHTML = `
                ${itemData.e}
                <span class="col-label">${name}</span>
            `;
            slot.title = `${name} [${itemData.r}] — 💎 ${itemData.p.toLocaleString()}`;
        } else {
            slot.innerHTML = `<span class="col-q">?</span>`;
            slot.title = "???";
        }

        grid.appendChild(slot);
    });

    document.getElementById("col-count").textContent = unlockedCount;
}

// -------------------------------------------------------
// UI HELPERS
// -------------------------------------------------------
function update() {
    document.getElementById("balance-display").textContent = "💎 " + money.toLocaleString();
    document.getElementById("mine-power").textContent = minePower.toLocaleString();
    document.getElementById("upgrade-cost-display").textContent = upgradeCost.toLocaleString();

    const upgradeBtn = document.getElementById("upgrade-btn");
    upgradeBtn.disabled = money < upgradeCost;

    const minerBtn = document.getElementById("auto-miner-btn");
    if (autoMiner) {
        minerBtn.textContent = "🤖 Auto-Miner Active";
        minerBtn.classList.add("active");
        minerBtn.disabled = true;
    } else {
        minerBtn.disabled = money < AUTO_MINER_COST;
    }
    updateMinerTicker();
}

function renderInv() {
    const grid = document.getElementById("inventory-grid");
    grid.innerHTML = "";
    inv.forEach(item => {
        const div = document.createElement("div");
        div.className  = `item-slot ${item.r}`;
        div.onclick    = () => sell(item.id);
        div.innerHTML  = `${item.e}<span class="price-tag">💎 ${Math.floor(item.p * 0.75).toLocaleString()}</span>`;
        grid.appendChild(div);
    });
}

// -------------------------------------------------------
// PERSISTENCE
// -------------------------------------------------------
function save() {
    localStorage.setItem("box_sim_v13", JSON.stringify({
        m:  money,
        i:  inv,
        mp: minePower,
        uc: upgradeCost,
        d:  discovered,
        am: autoMiner
    }));
}

function load() {
    const data = localStorage.getItem("box_sim_v13");
    if (data) {
        const p      = JSON.parse(data);
        money        = p.m  ?? 1000;
        inv          = p.i  ?? [];
        minePower    = p.mp ?? 10;
        upgradeCost  = p.uc ?? 1000;
        discovered   = p.d  ?? {};
        autoMiner    = p.am ?? false;
        renderInv();
    }
    // Migration: if old save exists (v12), import money/inv/mp/uc
    else {
        const old = localStorage.getItem("box_sim_v12");
        if (old) {
            const p    = JSON.parse(old);
            money      = p.m  ?? 1000;
            inv        = p.i  ?? [];
            minePower  = p.mp ?? 10;
            upgradeCost= p.uc ?? 1000;
            // Reconstruct discovered from existing inventory
            inv.forEach(item => { discovered[item.name] = true; });
            renderInv();
            save();
        }
    }
}

window.onload = init;

// ── PWA: Service Worker Registration ──────────────────────
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch(err => console.warn('[PWA] Service Worker registration failed:', err));
    });
}

// ── PWA: Install prompt (Android "Add to Home Screen") ────
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;

    // Show a subtle install banner after 3 seconds
    setTimeout(() => {
        if (!deferredInstallPrompt) return;
        const banner = document.createElement('div');
        banner.id = 'pwa-install-banner';
        banner.innerHTML = `
            <span>📲 Install Case Simulator as an app!</span>
            <button id="pwa-install-btn">Install</button>
            <button id="pwa-dismiss-btn">✕</button>
        `;
        banner.style.cssText = `
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:rgba(0,242,255,0.12); backdrop-filter:blur(14px);
            border:1px solid rgba(0,242,255,0.4); border-radius:16px;
            padding:14px 20px; display:flex; align-items:center; gap:12px;
            z-index:9999; font-family:'Rajdhani',sans-serif; font-size:15px;
            font-weight:700; color:#fff; white-space:nowrap;
            box-shadow:0 0 30px rgba(0,242,255,0.2);
        `;
        document.body.appendChild(banner);

        document.getElementById('pwa-install-btn').style.cssText = `
            background:linear-gradient(45deg,#00c3ff,#00f2ff); border:none;
            padding:8px 18px; border-radius:10px; color:#000; font-weight:800;
            font-family:'Rajdhani',sans-serif; font-size:14px; cursor:pointer;
        `;
        document.getElementById('pwa-dismiss-btn').style.cssText = `
            background:transparent; border:none; color:rgba(255,255,255,0.5);
            font-size:18px; cursor:pointer; padding:4px 6px; line-height:1;
        `;

        document.getElementById('pwa-install-btn').onclick = async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            deferredInstallPrompt = null;
            banner.remove();
        };
        document.getElementById('pwa-dismiss-btn').onclick = () => banner.remove();
    }, 3000);
});

window.addEventListener('appinstalled', () => {
    console.log('[PWA] App installed successfully!');
    deferredInstallPrompt = null;
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
});
</script>
