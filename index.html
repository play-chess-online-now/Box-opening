<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Jewel Case Simulator ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00f2ff;
            --Common: #b5bdc9;
            --Rare: #0077ff;
            --Epic: #a200ff;
            --Legendary: #ffaa00;
            --Mythic: #ff0077;
            --Exotic: #00ffa2;
            --Divine: #ffea00;
            --Zenith: #ff3c00;
            
            --g-Common: linear-gradient(135deg, #3a3d42 0%, #b5bdc9 100%);
            --g-Rare: linear-gradient(135deg, #0044ff 0%, #00d4ff 100%);
            --g-Epic: linear-gradient(135deg, #6a00ff 0%, #e100ff 100%);
            --g-Legendary: linear-gradient(135deg, #ff8800 0%, #ffd000 100%);
            --g-Mythic: linear-gradient(135deg, #d5006d 0%, #ff0055 100%);
            --g-Exotic: linear-gradient(135deg, #00c853 0%, #00ffa2 100%);
            --g-Divine: linear-gradient(135deg, #ffd600 0%, #fff700 100%);
            --g-Zenith: linear-gradient(135deg, #ff0000 0%, #ff6a00 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        #top-bar {
            position: sticky;
            top: 0; z-index: 100;
            padding: 15px 25px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        #balance-display {
            font-size: 30px;
            font-weight: 700; color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .section-header {
            display: flex;
            justify-content: space-between; align-items: center;
            margin: 30px 0 20px 0;
        }

        .section-title {
            font-size: 24px;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); font-weight: 700; border-left: 5px solid var(--accent);
            padding-left: 15px;
        }

        #mining-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none; padding: 12px 25px; border-radius: 12px;
            color: #000; font-weight: 800; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
        }

        /* --- NAPRAWA TABELKI (GRID) --- */
        #shop-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
            gap: 20px;
            width: 100%;
        }

        .case-card {
            border-radius: 25px;
            padding: 30px 15px;
            text-align: center;
            border: 3px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
        }

        .case-card:hover { transform: translateY(-10px); border-color: #fff; }

        .case-emoji { font-size: 70px; display: block; margin-bottom: 10px; }
        .case-name { font-size: 20px; font-weight: 900; display: block; margin-bottom: 10px; }
        .case-price-tag {
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;
            font-weight: 700; color: #ffd700; border: 1px solid #ffd700;
        }

        /* INVENTORY */
        #inventory-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)) !important;
            gap: 15px;
        }

        .item-slot {
            aspect-ratio: 1; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 40px; border: 2px solid transparent; cursor: pointer;
            background: rgba(255,255,255,0.05); position: relative;
        }

        .price-tag {
            font-size: 11px; position: absolute; bottom: 5px;
            color: #ffd700; font-weight: 800; background: rgba(0,0,0,0.8);
            padding: 2px 8px; border-radius: 5px;
        }

        /* OPENING SCREEN */
        #opening-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #050508 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        #opening-box { font-size: 200px; cursor: pointer; transition: 0.3s; }
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(5px, 2px) rotate(2deg); }
        }
        .explode { animation: explodeAnim 0.5s forwards; }
        @keyframes explodeAnim { 100% { transform: scale(5); opacity: 0; filter: blur(20px); } }

        /* SPINNER */
        #spinner-wrap { display: none; width: 100%; flex-direction: column; align-items: center; }
        #spinner-view {
            position: relative; width: 100%; height: 160px;
            background: #000; border-top: 3px solid var(--accent);
            border-bottom: 3px solid var(--accent); margin: 30px 0; overflow: hidden;
        }
        #spinner-rail {
            display: flex; position: absolute; left: 0; height: 100%;
            align-items: center; transition: transform 6s cubic-bezier(0.05, 0, 0.05, 1);
        }
        .spinner-item {
            min-width: 140px; height: 140px; margin: 0 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 70px; border-radius: 20px;
        }
        #spinner-line {
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
            background: #fff; z-index: 100; transform: translateX(-50%);
        }

        #reward-ui { display: none; text-align: center; }
        #reward-name { font-size: 40px; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; }
        #collect-btn {
            padding: 15px 60px; background: #fff; color: #000;
            border: none; border-radius: 50px; font-weight: 900; font-size: 22px; cursor: pointer;
        }

        /* RARITY */
        .Common { background: var(--g-Common); color: #fff; }
        .Rare { background: var(--g-Rare); color: #fff; }
        .Epic { background: var(--g-Epic); color: #fff; }
        .Legendary { background: var(--g-Legendary); color: #fff; }
        .Mythic { background: var(--g-Mythic); color: #fff; }
        .Exotic { background: var(--g-Exotic); color: #fff; }
        .Divine { background: var(--g-Divine); color: #fff; }
        .Zenith { background: var(--g-Zenith); color: #fff; }
    </style>
</head>
<body>

<div id="main-menu" style="display: flex; flex-direction: column;">
    <div id="top-bar">
        <div style="font-weight: 900; color: var(--accent); font-size: 24px;">JEWEL SIM ULTRA</div>
        <div id="balance-display">💎 0</div>
    </div>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Case Market</h2>
            <button id="mining-btn" onclick="mine()">Mine (+10)</button>
        </div>
        <div id="shop-grid"></div>

        <div class="section-header">
            <h2 class="section-title">Inventory</h2>
        </div>
        <div id="inventory-grid"></div>
    </div>
</div>

<div id="opening-screen">
    <div id="opening-box">📦</div>
    <div id="tap-info" style="margin-top: 30px; font-weight: 900; font-size: 24px;">CLICK TO OPEN!</div>
    
    <div id="spinner-wrap">
        <div id="spinner-view">
            <div id="spinner-line"></div>
            <div id="spinner-rail"></div>
        </div>
        <div id="reward-ui">
            <div id="reward-name">ITEM</div>
            <button id="collect-btn" onclick="collect()">COLLECT</button>
        </div>
    </div>
</div>

<script>
const ITEMS = {
    "Rusty Nail": {r:"Common", e:"🔩", p:35}, "Old Boot": {r:"Common", e:"🥾", p:50}, "Sharp Stone": {r:"Common", e:"🪨", p:65},
    "Iron Sword": {r:"Rare", e:"⚔️", p:420}, "Steel Shield": {r:"Rare", e:"🛡️", p:480}, "Hunter Bow": {r:"Rare", e:"🏹", p:550},
    "Magic Wand": {r:"Epic", e:"🪄", p:2800}, "Sea Trident": {r:"Epic", e:"🔱", p:3200}, "Heavy Axe": {r:"Epic", e:"🪓", p:3800},
    "Royal Crown": {r:"Legendary", e:"👑", p:22000}, "Ancient Key": {r:"Legendary", e:"🔑", p:28000},
    "Fire Phoenix": {r:"Mythic", e:"🐦‍🔥", p:280000}, "Void Dragon": {r:"Mythic", e:"🐉", p:550000},
    "Singularity": {r:"Exotic", e:"🕳️", p:2200000}, "Nebula Core": {r:"Exotic", e:"🌀", p:3800000},
    "Divine Wings": {r:"Divine", e:"🪽", p:15000000}, "Holy Grail": {r:"Divine", e:"⚱️", p:35000000},
    "Infinity Eye": {r:"Zenith", e:"👁️", p:100000000}, "God Scepter": {r:"Zenith", e:"🔱", p:200000000}
};

const CASES = {
    "WOODEN": {cost:100, e:"📦", r:"Common", drops:["Rusty Nail", "Old Boot", "Sharp Stone", "Iron Sword"]},
    "IRON": {cost:1000, e:"📦", r:"Rare", drops:["Iron Sword", "Steel Shield", "Hunter Bow", "Magic Wand"]},
    "STEEL": {cost:5000, e:"🧰", r:"Rare", drops:["Steel Shield", "Magic Wand", "Sea Trident", "Heavy Axe"]},
    "SILVER": {cost:25000, e:"🧰", r:"Epic", drops:["Magic Wand", "Sea Trident", "Royal Crown", "Ancient Key"]},
    "GOLDEN": {cost:120000, e:"💼", r:"Legendary", drops:["Royal Crown", "Ancient Key", "Fire Phoenix"]},
    "VOID": {cost:600000, e:"💼", r:"Mythic", drops:["Fire Phoenix", "Void Dragon", "Singularity"]},
    "COSMIC": {cost:3000000, e:"💼", r:"Exotic", drops:["Void Dragon", "Singularity", "Nebula Core"]},
    "DIVINE": {cost:20000000, e:"🎁", r:"Divine", drops:["Nebula Core", "Divine Wings", "Holy Grail", "Infinity Eye"]},
    "OMEGA": {cost:100000000, e:"🎁", r:"Zenith", drops:["Holy Grail", "Infinity Eye", "God Scepter"]}
};

let money = 1000;
let inv = [];
let pending = null;

function init() {
    const shop = document.getElementById("shop-grid");
    shop.innerHTML = "";
    Object.keys(CASES).forEach(name => {
        const c = CASES[name];
        const card = document.createElement("div");
        card.className = `case-card ${c.r}`;
        card.onclick = () => buy(name);
        card.innerHTML = `<span class="case-emoji">${c.e}</span><span class="case-name">${name}</span><span class="case-price-tag">💎 ${c.cost.toLocaleString()}</span>`;
        shop.appendChild(card);
    });
    load();
    update();
}

function mine() { money += 10; update(); save(); }

function buy(name) {
    const c = CASES[name];
    if (money < c.cost) return alert("Za mało diamentów!");
    money -= c.cost;
    const pool = c.drops;
    const dropName = pool[Math.floor(Math.random() * pool.length)];
    pending = { name: dropName, ...ITEMS[dropName], id: Date.now() + Math.random() };
    
    document.getElementById("main-menu").style.display = "none";
    document.getElementById("opening-screen").style.display = "flex";
    
    const box = document.getElementById("opening-box");
    box.style.display = "block";
    box.textContent = c.e;
    box.onclick = startOpening;
    document.getElementById("tap-info").style.display = "block";
    document.getElementById("spinner-wrap").style.display = "none";
    document.getElementById("reward-ui").style.display = "none";
    update();
}

function startOpening() {
    const box = document.getElementById("opening-box");
    box.onclick = null;
    box.classList.add("shake");
    document.getElementById("tap-info").style.display = "none";
    setTimeout(() => {
        box.classList.remove("shake");
        box.classList.add("explode");
        setTimeout(() => {
            box.style.display = "none";
            runSpinner();
        }, 500);
    }, 1000);
}

function runSpinner() {
    const wrap = document.getElementById("spinner-wrap");
    const rail = document.getElementById("spinner-rail");
    wrap.style.display = "flex";
    rail.innerHTML = "";
    rail.style.transition = "none";
    rail.style.transform = "translateX(0)";

    const winIdx = 30;
    const keys = Object.keys(ITEMS);
    for (let i = 0; i < 50; i++) {
        const data = (i === winIdx) ? pending : ITEMS[keys[Math.floor(Math.random() * keys.length)]];
        const card = document.createElement("div");
        card.className = `spinner-item ${data.r}`;
        card.innerHTML = data.e;
        rail.appendChild(card);
    }

    const itemW = 160; 
    const viewW = document.getElementById("spinner-view").offsetWidth;
    const offset = (winIdx * itemW) - (viewW / 2) + (itemW / 2);
    setTimeout(() => {
        rail.style.transition = "transform 6s cubic-bezier(0.05, 0, 0.05, 1)";
        rail.style.transform = `translateX(-${offset + (Math.random()*60-30)}px)`;
    }, 50);

    setTimeout(() => {
        document.getElementById("reward-ui").style.display = "block";
        const txt = document.getElementById("reward-name");
        txt.textContent = pending.name;
        txt.className = pending.r;
    }, 6500);
}

function collect() {
    inv.unshift(pending);
    document.getElementById("opening-screen").style.display = "none";
    const mainMenu = document.getElementById("main-menu");
    mainMenu.style.display = "flex";
    renderInv();
    save();
}

function sell(id) {
    const i = inv.findIndex(x => x.id === id);
    if (i !== -1) {
        money += Math.floor(inv[i].p * 0.75);
        inv.splice(i, 1);
        update();
        renderInv();
        save();
    }
}

function update() { document.getElementById("balance-display").textContent = "💎 " + money.toLocaleString(); }

function renderInv() {
    const grid = document.getElementById("inventory-grid");
    grid.innerHTML = "";
    inv.forEach(item => {
        const div = document.createElement("div");
        div.className = `item-slot ${item.r}`;
        div.onclick = () => sell(item.id);
        div.innerHTML = `${item.e} <span class="price-tag">💎 ${Math.floor(item.p * 0.75).toLocaleString()}</span>`;
        grid.appendChild(div);
    });
}

function save() { localStorage.setItem("box_sim_v7", JSON.stringify({m: money, i: inv})); }
function load() {
    const data = localStorage.getItem("box_sim_v7");
    if (data) {
        const p = JSON.parse(data);
        money = p.m; inv = p.i;
        renderInv();
    }
}

window.onload = init;
</script>
</body>
</html>
