<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Jewel Case Simulator - Ultra Spinner Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #08080f;
  --bg2:       #0e0e1a;
  --bg3:       #14141f;
  --panel:     #10101c;
  --border:    rgba(255,255,255,0.07);
  --accent:    #00d4ff;
  --accent2:   #7b2fff;
  --c-common:    #9ca3af;
  --c-rare:      #3b82f6;
  --c-epic:      #a855f7;
  --c-legendary: #f59e0b;
  --c-mythic:    #ec4899;
  --c-exotic:    #10b981;
  --c-divine:    #fde68a;
  --c-zenith:    #ff4500;
  --font-head: 'Exo 2', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #e0e0e0;
  font-family: var(--font-body);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Background Grid Effect */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px; animation: gridDrift 20s linear infinite; z-index: 0;
}
@keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }

/* TOP BAR */
#top-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
  border-bottom: 1px solid rgba(0,212,255,0.15);
}
#game-title { font-family: var(--font-head); font-size: 24px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#balance-label { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px rgba(0,212,255,0.6); }

/* UI PANELS */
#main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; padding: 16px 20px; min-height: 0; z-index: 5; }
.panel { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; border-radius: 4px; }
.panel-title { font-family: var(--font-head); font-size: 12px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); padding: 14px 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }

/* SHOP */
#cases-scroll { flex: 1; overflow-y: auto; padding: 14px; }
#cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.case-card { cursor: pointer; border-radius: 8px; transition: 0.3s; background: var(--bg3); text-align: center; padding: 20px; border: 1px solid transparent; }
.case-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
.case-emoji { font-size: 50px; margin-bottom: 10px; display: block; }
.case-name { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
.case-cost { color: var(--accent); font-weight: 700; }

/* INVENTORY & PREVIEW */
#right-content { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; flex: 1; padding: 12px; min-height: 0; }
#inventory-list { overflow-y: auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 5px; }
.inv-item { 
  padding: 12px; margin-bottom: 5px; background: rgba(255,255,255,0.03); 
  border-left: 4px solid #fff; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px;
}
.inv-item:hover { background: rgba(255,255,255,0.08); }

#preview-panel { background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
#preview-emoji { font-size: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
#preview-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
#preview-rarity { font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; margin-bottom: 30px; }
#sell-btn { 
  width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), var(--accent2)); 
  border: none; color: #fff; font-weight: 900; cursor: pointer; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
}
#sell-btn:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.5; }
#sell-btn:not(:disabled):hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(0,212,255,0.4); }

/* FULLSCREEN OVERLAY & SPINNER */
#fullscreen-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: radial-gradient(circle at center, #0e0e1a 0%, #03030a 100%);
  flex-direction: column; align-items: center; justify-content: center;
}
#fullscreen-overlay.active { display: flex; }

#spinner-container {
  display: none; position: relative; width: 90%; max-width: 800px; height: 180px;
  background: rgba(0, 0, 0, 0.8); border: 2px solid var(--border);
  overflow: hidden; margin: 40px 0; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
}
#spinner-line {
  position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
  background: var(--accent); box-shadow: 0 0 20px var(--accent); z-index: 10; transform: translateX(-50%);
}
#spinner-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; will-change: transform; }

.spinner-card {
  min-width: 150px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-right: 1px solid rgba(255,255,255,0.05); background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
}
.s-emoji { font-size: 60px; margin-bottom: 10px; }
.s-rarity-bar { height: 6px; width: 60%; border-radius: 10px; }

#box-icon { font-size: 180px; filter: drop-shadow(0 0 30px rgba(0,212,255,0.3)); cursor: pointer; transition: 0.2s; }
#box-icon:hover { transform: scale(1.05); }

#instruction-label { font-size: 28px; font-weight: 900; color: var(--accent); margin-top: 30px; text-transform: uppercase; letter-spacing: 5px; }
#subtext-label { font-size: 18px; color: rgba(255,255,255,0.5); margin-top: 10px; }
#back-btn { 
  display: none; margin-top: 40px; padding: 18px 50px; background: #fff; color: #000; 
  border: none; font-weight: 900; cursor: pointer; border-radius: 50px; text-transform: uppercase; letter-spacing: 2px;
}

/* Rarity Colors */
.Common { color: var(--c-common); border-color: var(--c-common) !important; }
.Rare { color: var(--c-rare); border-color: var(--c-rare) !important; }
.Epic { color: var(--c-epic); border-color: var(--c-epic) !important; }
.Legendary { color: var(--c-legendary); border-color: var(--c-legendary) !important; }
.Mythic { color: var(--c-mythic); border-color: var(--c-mythic) !important; }
.Exotic { color: var(--c-exotic); border-color: var(--c-exotic) !important; }
.Divine { color: var(--c-divine); border-color: var(--c-divine) !important; }
.Zenith { color: var(--c-zenith); border-color: var(--c-zenith) !important; text-shadow: 0 0 15px var(--c-zenith); }
</style>
</head>
<body>

<div id="top-bar">
  <div id="game-title">💎 Jewel Case Simulator</div>
  <div id="balance-label">💎 10,000</div>
</div>

<div id="main-content">
  <div class="panel">
    <div class="panel-title">⬡ Premium Cases</div>
    <div id="cases-scroll"><div id="cases-grid"></div></div>
  </div>
  <div class="panel">
    <div class="panel-title">⬡ Your Inventory</div>
    <div id="right-content">
      <div id="inventory-list"></div>
      <div id="preview-panel">
        <div id="preview-emoji">📦</div>
        <div id="preview-name">Select an item</div>
        <div id="preview-rarity">TO SEE DETAILS</div>
        <button id="sell-btn" disabled onclick="sellItem()">Sell Item</button>
      </div>
    </div>
  </div>
</div>

<div id="fullscreen-overlay">
  <div id="spinner-container">
    <div id="spinner-line"></div>
    <div id="spinner-track"></div>
  </div>
  <span id="box-icon" onclick="onBoxClick()"></span>
  <div id="instruction-label">Click to Open</div>
  <div id="subtext-label"></div>
  <button id="back-btn" onclick="endFullscreen()">↩ Return to Menu</button>
</div>

<script>
// --- CONFIGURATION ---
const RARITY_COLORS = { 
  Common: "#9ca3af", Rare: "#3b82f6", Epic: "#a855f7", Legendary: "#f59e0b", 
  Mythic: "#ec4899", Exotic: "#10b981", Divine: "#fde68a", Zenith: "#ff4500" 
};

const ITEMS = {
  "Stick":         {rarity:"Common",    price:50,       emoji:"🪵"},
  "Sword":         {rarity:"Rare",      price:250,      emoji:"⚔️"},
  "Orb":           {rarity:"Epic",      price:1200,     emoji:"🔮"},
  "Crown":         {rarity:"Legendary", price:8500,     emoji:"👑"},
  "Phoenix":       {rarity:"Mythic",    price:120000,   emoji:"🐦‍🔥"},
  "Black Hole":    {rarity:"Exotic",    price:850000,   emoji:"🕳️"},
  "Angel Wings":   {rarity:"Divine",    price:4500000,  emoji:"🪽"},
  "Infinity Core": {rarity:"Zenith",    price:45000000, emoji:"🌌"}
};

const CASES = {
  "Wooden Case": {
    cost: 100, emoji: "📦",
    drops: [
      { name: "Stick", weight: 70 },
      { name: "Sword", weight: 25 },
      { name: "Orb",   weight: 5 }
    ]
  },
  "Epic Case": {
    cost: 2500, emoji: "💎",
    drops: [
      { name: "Sword",   weight: 50 },
      { name: "Orb",     weight: 35 },
      { name: "Crown",   weight: 12 },
      { name: "Phoenix", weight: 3 }
    ]
  },
  "Omega Case": {
    cost: 1250000, emoji: "🌟",
    drops: [
      { name: "Phoenix",     weight: 45 },
      { name: "Black Hole",  weight: 35 },
      { name: "Angel Wings", weight: 15 },
      { name: "Infinity Core", weight: 5 }
    ]
  }
};

let balance = 10000;
let inventory = [];
let pendingDrop = null;
let animating = false;
let selectedInvIndex = -1;

// --- UTILS ---
function fmt(n) {
  if (n < 1e3) return n.toLocaleString();
  if (n < 1e6) return (n / 1e3).toFixed(2) + "K";
  if (n < 1e9) return (n / 1e6).toFixed(2) + "M";
  return (n / 1e9).toFixed(2) + "B";
}

function saveGame() {
  const data = { balance, inventory };
  localStorage.setItem("jewel_sim_save", JSON.stringify(data));
}

function loadGame() {
  const saved = localStorage.getItem("jewel_sim_save");
  if (saved) {
    const data = JSON.parse(saved);
    balance = data.balance;
    inventory = data.inventory;
    updateUI();
    updateInventoryUI();
  }
}

// --- CORE LOGIC ---
function init() {
  const grid = document.getElementById("cases-grid");
  Object.keys(CASES).forEach(name => {
    const c = CASES[name];
    const div = document.createElement("div");
    div.className = "case-card";
    div.onclick = () => openCase(name);
    div.innerHTML = `
      <span class="case-emoji">${c.emoji}</span>
      <div class="case-name">${name}</div>
      <div class="case-cost">💎 ${fmt(c.cost)}</div>
    `;
    grid.appendChild(div);
  });
  loadGame();
  updateUI();
}

function openCase(name) {
  if (animating) return;
  const c = CASES[name];
  if (balance < c.cost) return alert("Insufficient Jewels!");

  balance -= c.cost;
  
  // Weighted Random Logic
  const drops = c.drops;
  const totalWeight = drops.reduce((sum, d) => sum + d.weight, 0);
  let random = Math.random() * totalWeight;
  let chosenItemName = drops[0].name;

  for (const d of drops) {
    if (random < d.weight) {
      chosenItemName = d.name;
      break;
    }
    random -= d.weight;
  }

  pendingDrop = { name: chosenItemName, ...ITEMS[chosenItemName] };
  showBox(name);
  updateUI();
  saveGame();
}

function showBox(name) {
  animating = true;
  const ov = document.getElementById("fullscreen-overlay");
  ov.classList.add("active");
  
  document.getElementById("spinner-container").style.display = "none";
  const icon = document.getElementById("box-icon");
  icon.style.display = "block";
  icon.textContent = CASES[name].emoji;
  
  document.getElementById("instruction-label").style.display = "block";
  document.getElementById("instruction-label").textContent = "Click to Open";
  document.getElementById("instruction-label").className = "";
  document.getElementById("subtext-label").textContent = name;
  document.getElementById("back-btn").style.display = "none";
}

function onBoxClick() {
  if (animating && pendingDrop && document.getElementById("box-icon").style.display !== "none") {
    document.getElementById("instruction-label").textContent = "Opening...";
    startSpinner();
  }
}

function startSpinner() {
  const track = document.getElementById("spinner-track");
  const container = document.getElementById("spinner-container");
  const icon = document.getElementById("box-icon");
  
  icon.style.display = "none";
  container.style.display = "block";
  
  track.style.transition = "none";
  track.style.transform = "translateX(0)";
  track.innerHTML = "";

  const itemCount = 50; 
  const cardWidth = 150; 
  const winningIndex = 44; 

  const allKeys = Object.keys(ITEMS);
  for (let i = 0; i < itemCount; i++) {
    let item;
    if (i === winningIndex) {
      item = pendingDrop;
    } else {
      item = ITEMS[allKeys[Math.floor(Math.random() * allKeys.length)]];
    }

    const card = document.createElement("div");
    card.className = "spinner-card";
    card.innerHTML = `
      <div class="s-emoji" style="filter: drop-shadow(0 0 10px ${RARITY_COLORS[item.rarity]})">${item.emoji}</div>
      <div class="s-rarity-bar" style="background: ${RARITY_COLORS[item.rarity]}"></div>
    `;
    track.appendChild(card);
  }

  const centerOffset = container.offsetWidth / 2;
  const finalPos = (winningIndex * cardWidth) - centerOffset + (cardWidth / 2);
  const randomize = Math.floor(Math.random() * 80) - 40;

  setTimeout(() => {
    track.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.05, 1)";
    track.style.transform = `translateX(-${finalPos + randomize}px)`;
  }, 50);

  setTimeout(reveal, 6200);
}

function reveal() {
  const instr = document.getElementById("instruction-label");
  instr.textContent = pendingDrop.name;
  instr.className = pendingDrop.rarity;
  
  inventory.unshift(pendingDrop); // Add to start of inventory
  updateUI();
  updateInventoryUI();
  saveGame();
  
  document.getElementById("back-btn").style.display = "block";
}

function endFullscreen() {
  document.getElementById("fullscreen-overlay").classList.remove("active");
  animating = false;
  pendingDrop = null;
}

// --- UI UPDATES ---
function updateUI() {
  document.getElementById("balance-label").textContent = "💎 " + fmt(balance);
}

function updateInventoryUI() {
  const list = document.getElementById("inventory-list");
  list.innerHTML = "";
  inventory.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "inv-item";
    div.style.borderColor = RARITY_COLORS[item.rarity];
    div.innerHTML = `<span>${item.emoji}</span> <span class="${item.rarity}">${item.name}</span>`;
    div.onclick = () => selectItem(index);
    list.appendChild(div);
  });
}

function selectItem(index) {
  selectedInvIndex = index;
  const item = inventory[index];
  const preEmoji = document.getElementById("preview-emoji");
  const preName = document.getElementById("preview-name");
  const preRarity = document.getElementById("preview-rarity");
  const btn = document.getElementById("sell-btn");

  preEmoji.textContent = item.emoji;
  preName.textContent = item.name;
  preName.className = item.rarity;
  preRarity.textContent = item.rarity;
  preRarity.className = item.rarity;
  
  btn.disabled = false;
  btn.textContent = "Sell for 💎 " + fmt(item.price);
}

function sellItem() {
  if (selectedInvIndex > -1) {
    balance += inventory[selectedInvIndex].price;
    inventory.splice(selectedInvIndex, 1);
    selectedInvIndex = -1;
    
    // Reset Preview
    document.getElementById("preview-emoji").textContent = "📦";
    document.getElementById("preview-name").textContent = "Select an item";
    document.getElementById("preview-name").className = "";
    document.getElementById("preview-rarity").textContent = "TO SEE DETAILS";
    document.getElementById("preview-rarity").className = "";
    document.getElementById("sell-btn").disabled = true;
    document.getElementById("sell-btn").textContent = "Sell Item";

    updateUI();
    updateInventoryUI();
    saveGame();
  }
}

window.onload = init;
</script>
</body>
</html>
