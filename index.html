<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Jewel Case Simulator ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00f2ff;
            /* Rarity Colors */
            --Common: #b5bdc9;
            --Rare: #0077ff;
            --Epic: #a200ff;
            --Legendary: #ffaa00;
            --Mythic: #ff0077;
            --Exotic: #00ffa2;
            --Divine: #ffea00;
            --Zenith: #ff3c00;
            
            --g-Common: linear-gradient(135deg, #2c2f33 0%, #4f545c 100%);
            --g-Rare: linear-gradient(135deg, #003366 0%, #0077ff 100%);
            --g-Epic: linear-gradient(135deg, #440066 0%, #a200ff 100%);
            --g-Legendary: linear-gradient(135deg, #664400 0%, #ffaa00 100%);
            --g-Mythic: linear-gradient(135deg, #660033 0%, #ff0077 100%);
            --g-Exotic: linear-gradient(135deg, #006644 0%, #00ffa2 100%);
            --g-Divine: linear-gradient(135deg, #665500 0%, #ffea00 100%);
            --g-Zenith: linear-gradient(135deg, #661100 0%, #ff3c00 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        #top-bar {
            position: sticky; top: 0; z-index: 100;
            padding: 15px 25px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        #balance-display {
            font-size: 28px; font-weight: 700; color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 30px 0 20px 0;
        }

        .section-title {
            font-size: 24px; text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); font-weight: 700; border-left: 5px solid var(--accent);
            padding-left: 15px;
        }

        /* BUTTONS */
        #mining-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none; padding: 12px 25px; border-radius: 12px;
            color: #000; font-weight: 800; cursor: pointer;
            transition: 0.2s; box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
        }
        #mining-btn:active { transform: scale(0.95); }

        /* SHOP GRID */
        #shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .case-card {
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .case-card:hover {
            transform: translateY(-10px) scale(1.05);
            filter: brightness(1.2);
            z-index: 5;
        }

        .case-emoji {
            font-size: 80px; display: block; margin-bottom: 15px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: pulseEmoji 3s infinite ease-in-out;
        }

        @keyframes pulseEmoji {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .case-name { font-size: 20px; font-weight: 700; display: block; margin-bottom: 10px; }

        .case-price-tag {
            background: rgba(0,0,0,0.6); padding: 5px 15px;
            border-radius: 50px; font-size: 15px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* INVENTORY */
        #inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px; margin-bottom: 50px;
        }

        .item-slot {
            aspect-ratio: 1; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 45px; border: 2px solid transparent; cursor: pointer;
            transition: 0.3s; position: relative;
            background: rgba(255,255,255,0.05);
        }
        .item-slot:hover { transform: scale(1.1); z-index: 2; }

        .price-tag {
            font-size: 11px; position: absolute; bottom: 8px;
            color: #ffd700; font-weight: 700; background: rgba(0,0,0,0.8);
            padding: 2px 8px; border-radius: 6px;
        }

        /* --- OPENING SCREEN --- */
        #opening-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #151525 0%, #050508 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        #opening-box { font-size: 220px; cursor: pointer; transition: 0.3s; }
        
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0% { transform: rotate(0); }
            50% { transform: rotate(5deg) scale(1.1); }
            100% { transform: rotate(-5deg); }
        }

        .explode { animation: explodeAnim 0.5s forwards; }
        @keyframes explodeAnim {
            100% { transform: scale(5); opacity: 0; filter: blur(20px) brightness(5); }
        }

        /* ROULETTE */
        #spinner-wrap { display: none; width: 100%; flex-direction: column; align-items: center; }
        #spinner-view {
            position: relative; width: 100%; height: 180px;
            background: rgba(0,0,0,0.8); border-top: 3px solid var(--accent);
            border-bottom: 3px solid var(--accent); margin: 40px 0; overflow: hidden;
        }
        #spinner-rail {
            display: flex; position: absolute; left: 0; height: 100%;
            align-items: center; transition: transform 6s cubic-bezier(0.05, 0, 0.05, 1);
        }
        .spinner-item {
            min-width: 150px; height: 150px; margin: 0 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; background: rgba(255,255,255,0.05);
            border-radius: 25px; border: 3px solid transparent;
        }
        #spinner-line {
            position: absolute; left: 50%; top: 0; width: 6px; height: 100%;
            background: #fff; z-index: 100; box-shadow: 0 0 20px #fff; transform: translateX(-50%);
        }

        #reward-ui { display: none; text-align: center; }
        #reward-name { font-size: 45px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; }
        #collect-btn {
            padding: 20px 80px; background: #fff; border: none; border-radius: 100px;
            color: #000; font-weight: 900; font-size: 24px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.4); text-transform: uppercase;
        }

        /* RARITY SYSTEM */
        .Common { background: var(--g-Common); border-color: var(--Common); box-shadow: 0 0 20px rgba(181,189,201,0.3); color: var(--Common); text-shadow: 0 0 10px var(--Common); }
        .Rare { background: var(--g-Rare); border-color: var(--Rare); box-shadow: 0 0 25px rgba(0,119,255,0.4); color: var(--Rare); text-shadow: 0 0 10px var(--Rare); }
        .Epic { background: var(--g-Epic); border-color: var(--Epic); box-shadow: 0 0 30px rgba(162,0,255,0.5); color: var(--Epic); text-shadow: 0 0 10px var(--Epic); }
        .Legendary { background: var(--g-Legendary); border-color: var(--Legendary); box-shadow: 0 0 35px rgba(255,170,0,0.6); color: var(--Legendary); text-shadow: 0 0 10px var(--Legendary); }
        .Mythic { background: var(--g-Mythic); border-color: var(--Mythic); box-shadow: 0 0 40px rgba(255,0,119,0.7); color: var(--Mythic); text-shadow: 0 0 15px var(--Mythic); }
        .Exotic { background: var(--g-Exotic); border-color: var(--Exotic); box-shadow: 0 0 45px rgba(0,255,162,0.8); color: var(--Exotic); text-shadow: 0 0 15px var(--Exotic); }
        .Divine { background: var(--g-Divine); border-color: var(--Divine); box-shadow: 0 0 50px rgba(255,234,0,0.9); color: var(--Divine); text-shadow: 0 0 20px var(--Divine); }
        .Zenith { background: var(--g-Zenith); border-color: var(--Zenith); box-shadow: 0 0 60px rgba(255,60,0,1); color: var(--Zenith); text-shadow: 0 0 30px var(--Zenith); }
    </style>
</head>
<body>

<div id="main-menu">
    <div id="top-bar">
        <div style="font-family: 'Exo 2', sans-serif; font-weight: 900; color: var(--accent); font-size: 24px; letter-spacing: 1px;">CASE SIMULATOR ULTRA</div>
        <div id="balance-display">💎 1,000</div>
    </div>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Case Market</h2>
            <button id="mining-btn" onclick="mine()">Mine Diamonds (+10)</button>
        </div>
        <div id="shop-grid"></div>

        <div class="section-header">
            <h2 class="section-title">Inventory</h2>
        </div>
        <div id="inventory-grid"></div>
    </div>
</div>

<div id="opening-screen">
    <div id="opening-box">📦</div>
    <div id="tap-info" style="margin-top: 50px; font-weight: 700; color: #fff; font-size: 26px; letter-spacing: 3px;">TAP TO CRACK IT!</div>
    
    <div id="spinner-wrap">
        <div id="spinner-view">
            <div id="spinner-line"></div>
            <div id="spinner-rail"></div>
        </div>
        <div id="reward-ui">
            <div id="reward-name">ITEM</div>
            <button id="collect-btn" onclick="collect()">COLLECT AND RETURN</button>
        </div>
    </div>
</div>

<script>
// --- DATABASE ---
const ITEMS = {
    "Rusty Nail": {r:"Common", e:"🔩", p:30}, "Old Boot": {r:"Common", e:"🥾", p:45}, "Sharp Stone": {r:"Common", e:"🪨", p:60},
    "Iron Sword": {r:"Rare", e:"⚔️", p:400}, "Steel Shield": {r:"Rare", e:"🛡️", p:450}, "Hunter Bow": {r:"Rare", e:"🏹", p:500},
    "Magic Wand": {r:"Epic", e:"🪄", p:2500}, "Sea Trident": {r:"Epic", e:"🔱", p:3000}, "Heavy Axe": {r:"Epic", e:"🪓", p:3500},
    "Royal Crown": {r:"Legendary", e:"👑", p:20000}, "Ancient Key": {r:"Legendary", e:"🔑", p:25000},
    "Fire Phoenix": {r:"Mythic", e:"🐦‍🔥", p:250000}, "Void Dragon": {r:"Mythic", e:"🐉", p:500000},
    "Singularity": {r:"Exotic", e:"🕳️", p:2000000}, "Nebula Core": {r:"Exotic", e:"🌀", p:3500000},
    "Divine Wings": {r:"Divine", e:"🪽", p:12000000}, "Holy Grail": {r:"Divine", e:"⚱️", p:30000000},
    "Infinity Eye": {r:"Zenith", e:"👁️", p:90000000}, "God Scepter": {r:"Zenith", e:"🔱", p:150000000}
};

const CASES = {
    "WOODEN": {cost:100, e:"📦", r:"Common", drops:["Rusty Nail", "Old Boot", "Sharp Stone", "Iron Sword"]},
    "IRON": {cost:800, e:"📦", r:"Rare", drops:["Iron Sword", "Steel Shield", "Hunter Bow", "Magic Wand"]},
    "STEEL": {cost:4000, e:"🧰", r:"Rare", drops:["Steel Shield", "Magic Wand", "Sea Trident", "Heavy Axe"]},
    "SILVER": {cost:20000, e:"🧰", r:"Epic", drops:["Magic Wand", "Sea Trident", "Royal Crown", "Ancient Key"]},
    "GOLDEN": {cost:100000, e:"💼", r:"Legendary", drops:["Royal Crown", "Ancient Key", "Fire Phoenix"]},
    "VOID": {cost:500000, e:"💼", r:"Mythic", drops:["Fire Phoenix", "Void Dragon", "Singularity"]},
    "COSMIC": {cost:2500000, e:"💼", r:"Exotic", drops:["Void Dragon", "Singularity", "Nebula Core"]},
    "DIVINE": {cost:15000000, e:"🎁", r:"Divine", drops:["Nebula Core", "Divine Wings", "Holy Grail", "Infinity Eye"]},
    "OMEGA": {cost:75000000, e:"🎁", r:"Zenith", drops:["Holy Grail", "Infinity Eye", "God Scepter"]}
};

let money = 1000;
let inv = [];
let pending = null;

function init() {
    const shop = document.getElementById("shop-grid");
    Object.keys(CASES).forEach(name => {
        const c = CASES[name];
        const card = document.createElement("div");
        card.className = `case-card ${c.r}`;
        card.onclick = () => buy(name);
        card.innerHTML = `
            <span class="case-emoji">${c.e}</span>
            <span class="case-name">${name} CASE</span>
            <span class="case-price-tag">💎 ${c.cost.toLocaleString()}</span>
        `;
        shop.appendChild(card);
    });
    load();
    update();
}

function mine() { money += 10; update(); save(); }

function buy(name) {
    const c = CASES[name];
    if (money < c.cost) return alert("Not enough Diamonds!");
    
    money -= c.cost;
    const pool = c.drops;
    const dropName = pool[Math.floor(Math.random() * pool.length)];
    pending = { name: dropName, ...ITEMS[dropName], id: Date.now() + Math.random() };
    
    document.getElementById("main-menu").style.display = "none";
    const screen = document.getElementById("opening-screen");
    screen.style.display = "flex";
    
    const box = document.getElementById("opening-box");
    box.style.display = "block";
    box.textContent = c.e;
    box.className = c.r;
    box.onclick = startOpening;
    
    document.getElementById("tap-info").style.display = "block";
    document.getElementById("spinner-wrap").style.display = "none";
    document.getElementById("reward-ui").style.display = "none";
    update();
}

function startOpening() {
    const box = document.getElementById("opening-box");
    box.onclick = null;
    box.classList.add("shake");
    document.getElementById("tap-info").style.display = "none";
    
    setTimeout(() => {
        box.classList.remove("shake");
        box.classList.add("explode");
        setTimeout(() => {
            box.style.display = "none";
            box.classList.remove("explode");
            runSpinner();
        }, 450);
    }, 1000);
}

function runSpinner() {
    const wrap = document.getElementById("spinner-wrap");
    const rail = document.getElementById("spinner-rail");
    wrap.style.display = "flex";
    rail.innerHTML = "";
    rail.style.transition = "none";
    rail.style.transform = "translateX(0)";

    const winIdx = 35;
    const allKeys = Object.keys(ITEMS);
    
    for (let i = 0; i < 50; i++) {
        const data = (i === winIdx) ? pending : ITEMS[allKeys[Math.floor(Math.random() * allKeys.length)]];
        const card = document.createElement("div");
        card.className = `spinner-item ${data.r}`;
        card.innerHTML = data.e;
        rail.appendChild(card);
    }

    const itemW = 170; // 150 + 20 margin
    const viewW = document.getElementById("spinner-view").offsetWidth;
    const offset = (winIdx * itemW) - (viewW / 2) + (itemW / 2);
    
    setTimeout(() => {
        rail.style.transition = "transform 6s cubic-bezier(0.05, 0, 0.05, 1)";
        rail.style.transform = `translateX(-${offset + (Math.random()*80 - 40)}px)`;
    }, 50);

    setTimeout(() => {
        document.getElementById("reward-ui").style.display = "block";
        const txt = document.getElementById("reward-name");
        txt.textContent = pending.name;
        txt.className = pending.r;
    }, 6500);
}

function collect() {
    inv.unshift(pending);
    document.getElementById("opening-screen").style.display = "none";
    document.getElementById("main-menu").style.display = "flex";
    renderInv();
    save();
}

function sell(id) {
    const i = inv.findIndex(x => x.id === id);
    if (i !== -1) {
        money += Math.floor(inv[i].p * 0.75);
        inv.splice(i, 1);
        update();
        renderInv();
        save();
    }
}

function update() {
    document.getElementById("balance-display").textContent = "💎 " + money.toLocaleString();
}

function renderInv() {
    const grid = document.getElementById("inventory-grid");
    grid.innerHTML = "";
    inv.forEach(item => {
        const div = document.createElement("div");
        div.className = `item-slot ${item.r}`;
        div.onclick = () => sell(item.id);
        div.innerHTML = `${item.e} <span class="price-tag">💎 ${Math.floor(item.p * 0.75).toLocaleString()}</span>`;
        grid.appendChild(div);
    });
}

function save() { localStorage.setItem("box_sim_v5", JSON.stringify({m: money, i: inv})); }
function load() {
    const data = localStorage.getItem("box_sim_v5");
    if (data) {
        const p = JSON.parse(data);
        money = p.m; inv = p.i;
        renderInv();
    }
}

window.onload = init;
</script>
</body>
</html>
