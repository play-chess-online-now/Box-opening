<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Jewel Case Simulator - Professional Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05050a;
  --bg2: #0a0a15;
  --panel: rgba(20, 20, 35, 0.8);
  --accent: #00d4ff;
  --accent2: #ff00ff;
  
  /* Kolory Rzadkości z poświatą */
  --c-common: #9ca3af;
  --c-rare: #3b82f6;
  --c-epic: #a855f7;
  --c-legendary: #f59e0b;
  --c-mythic: #ec4899;
  --c-exotic: #10b981;
  --c-divine: #fde68a;
  --c-zenith: #ff4500;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #fff;
  font-family: var(--font-body);
  height: 100vh;
  overflow: hidden;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
}

/* TOP BAR - Kolorowy pasek statusu */
#top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255, 255, 255, 0.03);
  border-bottom: 2px solid rgba(0, 212, 255, 0.2);
  backdrop-filter: blur(10px);
}
#game-title { 
  font-family: 'Exo 2', sans-serif; font-size: 24px; font-weight: 900; 
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 10px rgba(0,212,255,0.5));
}
#balance-label { font-size: 30px; font-weight: 700; color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.4); }

/* LAYOUT */
#main-content { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; height: calc(100vh - 80px); padding: 20px; }

.panel { 
  background: var(--panel); 
  border: 1px solid rgba(255,255,255,0.1); 
  border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;
  backdrop-filter: blur(10px);
}
.panel-title { 
  padding: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
  background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1);
  color: var(--accent);
}

/* SKLEP - 10 SKRZYNEK */
#cases-grid { 
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
  gap: 15px; padding: 20px; overflow-y: auto;
}
.case-card { 
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
}
.case-card:hover { 
  background: rgba(255,255,255,0.08); transform: translateY(-5px);
  border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.3);
}
.case-emoji { font-size: 50px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
.case-name { font-weight: 700; margin-bottom: 5px; color: #eee; }
.case-cost { color: var(--accent); font-weight: 700; font-size: 14px; }

/* INWENTARZ */
#inventory-list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
.inv-slot { 
  aspect-ratio: 1; background: rgba(0,0,0,0.3); border-radius: 8px; 
  display: flex; align-items: center; justify-content: center; font-size: 30px;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
}
.inv-slot:hover { border-color: #fff; background: rgba(255,255,255,0.1); }

/* PREVIEW */
#preview-panel { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); }
#preview-emoji { font-size: 80px; margin-bottom: 10px; }
#sell-btn { 
  width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(90deg, #ff4b2b, #ff416c);
  color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px;
}

/* SPINNER OVERLAY */
#fullscreen-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(5, 5, 15, 0.98); flex-direction: column; align-items: center; justify-content: center;
}
#fullscreen-overlay.active { display: flex; }

#spinner-container {
  position: relative; width: 100%; max-width: 900px; height: 200px;
  background: rgba(255,255,255,0.02); border-block: 2px solid rgba(255,255,255,0.1);
  margin: 50px 0; overflow: hidden;
}
#spinner-line {
  position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
  background: var(--accent); z-index: 10; transform: translateX(-50%);
  box-shadow: 0 0 20px var(--accent);
}
#spinner-track { display: flex; position: absolute; left: 0; height: 100%; align-items: center; transition: transform 6s cubic-bezier(0.1, 0, 0.05, 1); }

.spinner-card {
  min-width: 160px; height: 160px; margin: 0 5px; border-radius: 12px;
  background: rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-bottom: 5px solid #ccc;
}

#claim-btn { 
  display: none; padding: 20px 60px; font-size: 20px; font-weight: 900; 
  background: var(--accent); color: #000; border: none; border-radius: 50px;
  cursor: pointer; box-shadow: 0 0 30px var(--accent); text-transform: uppercase;
}

/* KOLORY RZADKOŚCI */
.Common { color: var(--c-common); border-color: var(--c-common) !important; }
.Rare { color: var(--c-rare); border-color: var(--c-rare) !important; }
.Epic { color: var(--c-epic); border-color: var(--c-epic) !important; }
.Legendary { color: var(--c-legendary); border-color: var(--c-legendary) !important; text-shadow: 0 0 10px var(--c-legendary); }
.Mythic { color: var(--c-mythic); border-color: var(--c-mythic) !important; text-shadow: 0 0 15px var(--c-mythic); }
.Zenith { color: var(--c-zenith); border-color: var(--c-zenith) !important; text-shadow: 0 0 20px var(--c-zenith); animation: zenithGlow 2s infinite alternate; }

@keyframes zenithGlow { from { box-shadow: 0 0 10px var(--c-zenith); } to { box-shadow: 0 0 30px var(--c-zenith); } }
</style>
</head>
<body>

<div id="top-bar">
  <div id="game-title">💎 JEWEL CASE SIMULATOR</div>
  <div id="balance-label">💎 0</div>
</div>

<div id="main-content">
  <div class="panel">
    <div class="panel-title">🛒 Case Market</div>
    <div id="cases-grid"></div>
  </div>
  
  <div class="panel">
    <div class="panel-title">🎒 Inventory</div>
    <div id="inventory-list"></div>
    <div id="preview-panel">
      <div id="preview-emoji">📦</div>
      <div id="preview-name">Wybierz przedmiot</div>
      <button id="sell-btn" onclick="sellItem()" style="display:none">Sprzedaj</button>
    </div>
  </div>
</div>

<div id="fullscreen-overlay">
  <div id="instruction-label" style="font-size:30px; font-weight:900; letter-spacing:3px; margin-bottom:20px">CASE OPENING</div>
  <div id="spinner-container">
    <div id="spinner-line"></div>
    <div id="spinner-track"></div>
  </div>
  <div id="win-announcement" style="font-size:40px; font-weight:900; margin-bottom:30px"></div>
  <button id="claim-btn" onclick="claimReward()">ODEBIERZ NAGRODĘ</button>
</div>

<script>
// --- BAZA PRZEDMIOTÓW ---
const ITEMS = {
  "Stick": {r:"Common", p:50, e:"🪵"},
  "Stone": {r:"Common", p:80, e:"🪨"},
  "Sword": {r:"Rare", p:300, e:"⚔️"},
  "Shield": {r:"Rare", p:450, e:"🛡️"},
  "Orb": {r:"Epic", p:1500, e:"🔮"},
  "Wand": {r:"Epic", p:2200, e:"🪄"},
  "Crown": {r:"Legendary", p:10000, e:"👑"},
  "Dragon": {r:"Legendary", p:15000, e:"🐉"},
  "Phoenix": {r:"Mythic", p:80000, e:"🐦‍🔥"},
  "Black Hole": {r:"Exotic", p:500000, e:"🕳️"},
  "Infinity": {r:"Zenith", p:10000000, e:"🌌"}
};

// --- 10 SKRZYNEK ---
const CASES = {
  "Drewniana": {cost:100, e:"📦", drops:["Stick", "Stick", "Stone", "Sword"]},
  "Żelazna": {cost:500, e:"⛓️", drops:["Stone", "Sword", "Shield", "Orb"]},
  "Złota": {cost:2500, e:"💰", drops:["Sword", "Shield", "Orb", "Wand"]},
  "Diamentowa": {cost:10000, e:"💎", drops:["Orb", "Wand", "Crown", "Dragon"]},
  "Szmaragdowa": {cost:50000, e:"💚", drops:["Wand", "Crown", "Dragon", "Phoenix"]},
  "Mityczna": {cost:200000, e:"💜", drops:["Dragon", "Phoenix", "Black Hole"]},
  "Boska": {cost:1000000, e:"🔱", drops:["Phoenix", "Black Hole", "Infinity"]},
  "Mroczna": {cost:5000000, e:"💀", drops:["Black Hole", "Infinity", "Infinity"]},
  "Kosmiczna": {cost:25000000, e:"🛸", drops:["Infinity"]},
  "Omega": {cost:100000000, e:"🧬", drops:["Infinity"]}
};

let balance = 10000;
let inventory = [];
let pendingDrop = null;
let selectedIndex = -1;

function fmt(n) {
  if(n >= 1e9) return (n/1e9).toFixed(2) + "B";
  if(n >= 1e6) return (n/1e6).toFixed(2) + "M";
  if(n >= 1e3) return (n/1e3).toFixed(1) + "K";
  return n.toLocaleString();
}

function init() {
  const grid = document.getElementById("cases-grid");
  Object.keys(CASES).forEach(name => {
    const c = CASES[name];
    const div = document.createElement("div");
    div.className = "case-card";
    div.onclick = () => openCase(name);
    div.innerHTML = `
      <span class="case-emoji">${c.e}</span>
      <div class="case-name">${name}</div>
      <div class="case-cost">💎 ${fmt(c.cost)}</div>
    `;
    grid.appendChild(div);
  });
  updateUI();
}

function openCase(name) {
  const c = CASES[name];
  if(balance < c.cost) return alert("Za mało klejnotów!");
  
  balance -= c.cost;
  const dropName = c.drops[Math.floor(Math.random() * c.drops.length)];
  pendingDrop = { name: dropName, ...ITEMS[dropName] };
  
  startOpening();
  updateUI();
}

function startOpening() {
  const ov = document.getElementById("fullscreen-overlay");
  const track = document.getElementById("spinner-track");
  ov.classList.add("active");
  
  document.getElementById("claim-btn").style.display = "none";
  document.getElementById("win-announcement").textContent = "";
  
  track.style.transition = "none";
  track.style.transform = "translateX(0)";
  track.innerHTML = "";

  const count = 60;
  const winIdx = 55;
  const cardWidth = 170; // 160px + 10px margin

  const allItems = Object.keys(ITEMS);
  for(let i=0; i<count; i++) {
    const item = (i === winIdx) ? pendingDrop : ITEMS[allItems[Math.floor(Math.random() * allItems.length)]];
    const card = document.createElement("div");
    card.className = `spinner-card ${item.r}`;
    card.innerHTML = `<span style="font-size:60px">${item.e}</span>`;
    track.appendChild(card);
  }

  const offset = (winIdx * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
  const extra = Math.floor(Math.random() * 100) - 50;

  setTimeout(() => {
    track.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.05, 1)";
    track.style.transform = `translateX(-${offset + extra}px)`;
  }, 50);

  setTimeout(() => {
    const winArea = document.getElementById("win-announcement");
    winArea.textContent = `WYGRAŁEŚ: ${pendingDrop.name.toUpperCase()}`;
    winArea.className = pendingDrop.r;
    document.getElementById("claim-btn").style.display = "block";
  }, 6500);
}

function claimReward() {
  inventory.unshift(pendingDrop);
  document.getElementById("fullscreen-overlay").classList.remove("active");
  pendingDrop = null;
  updateUI();
  updateInventoryUI();
  save();
}

function updateUI() {
  document.getElementById("balance-label").textContent = "💎 " + fmt(balance);
}

function updateInventoryUI() {
  const list = document.getElementById("inventory-list");
  list.innerHTML = "";
  inventory.forEach((item, i) => {
    const slot = document.createElement("div");
    slot.className = `inv-slot ${item.r}`;
    slot.textContent = item.e;
    slot.onclick = () => selectItem(i);
    list.appendChild(slot);
  });
}

function selectItem(i) {
  selectedIndex = i;
  const item = inventory[i];
  document.getElementById("preview-emoji").textContent = item.e;
  document.getElementById("preview-name").textContent = item.name + " (" + item.r + ")";
  document.getElementById("preview-name").className = item.r;
  const btn = document.getElementById("sell-btn");
  btn.style.display = "block";
  btn.textContent = `Sprzedaj za 💎 ${fmt(item.p)}`;
}

function sellItem() {
  if(selectedIndex > -1) {
    balance += inventory[selectedIndex].p;
    inventory.splice(selectedIndex, 1);
    selectedIndex = -1;
    document.getElementById("preview-emoji").textContent = "📦";
    document.getElementById("preview-name").textContent = "Wybierz przedmiot";
    document.getElementById("sell-btn").style.display = "none";
    updateUI();
    updateInventoryUI();
    save();
  }
}

function save() {
  localStorage.setItem("jewel_save", JSON.stringify({b: balance, i: inventory}));
}

function load() {
  const s = localStorage.getItem("jewel_save");
  if(s) {
    const d = JSON.parse(s);
    balance = d.b;
    inventory = d.i;
    updateUI();
    updateInventoryUI();
  }
}

window.onload = () => { init(); load(); };
</script>
</body>
</html>
